version: "1.0"
models:
  - id: model-bookmark
    name: Bookmark
    description: Core data entity representing a saved bookmark. Persisted in
      localStorage via BookmarkStore.
    fields:
      - name: id
        type: string
        required: true
        description: UUID v4, generated on create. Primary key.
      - name: title
        type: string
        required: true
        description: Display title. Min 2 chars, max 120 chars after whitespace trim.
      - name: url
        type: string
        required: true
        description: Full URL. Must start with http:// or https://.
      - name: tags
        type: string[]
        required: false
        description: "Array of 0–5 tags. Each tag: lowercase, alphanumeric + hyphens
          only, max 20 chars."
      - name: notes
        type: string
        required: false
        description: Free-text notes. Max 280 chars.
      - name: createdAt
        type: string
        required: true
        description: ISO 8601 timestamp set on create.
      - name: updatedAt
        type: string
        required: true
        description: ISO 8601 timestamp updated on every upsert.
  - id: model-create-bookmark-input
    name: CreateBookmarkInput
    description: Input shape for creating a new bookmark. id, createdAt, updatedAt
      are generated by the store.
    fields:
      - name: title
        type: string
        required: true
        description: 2–120 chars after trim.
      - name: url
        type: string
        required: true
        description: Valid http/https URL.
      - name: tags
        type: string[]
        required: false
        description: 0–5 valid tag strings.
      - name: notes
        type: string
        required: false
        description: 0–280 chars.
  - id: model-update-bookmark-input
    name: UpdateBookmarkInput
    description: Input shape for updating an existing bookmark. All fields are
      optional (partial update).
    fields:
      - name: title
        type: string
        required: false
        description: 2–120 chars after trim.
      - name: url
        type: string
        required: false
        description: Valid http/https URL.
      - name: tags
        type: string[]
        required: false
        description: 0–5 valid tag strings.
      - name: notes
        type: string
        required: false
        description: 0–280 chars.
  - id: model-filter-state
    name: FilterState
    description: Client-side UI state for the home page filter and search controls.
    fields:
      - name: searchQuery
        type: string
        required: false
        description: Current text in the SearchBar input. Empty string means no search
          filter active.
      - name: activeTags
        type: string[]
        required: false
        description: Array of currently active tag filter chips. Empty array means 'All'
          (no tag filter).
  - id: model-toast-state
    name: ToastState
    description: Transient UI state for the global toast notification.
    fields:
      - name: visible
        type: boolean
        required: true
        description: Whether the toast is currently displayed.
      - name: message
        type: string
        required: true
        description: Text content of the toast message.
      - name: type
        type: string
        required: false
        description: "One of: 'success' | 'error' | 'info'. Defaults to 'success'."
  - id: model-validation-error
    name: ValidationError
    description: Shape of a single field validation error in the form.
    fields:
      - name: field
        type: string
        required: true
        description: The form field name this error applies to (e.g., 'title', 'url',
          'tags', 'notes').
      - name: ruleId
        type: string
        required: true
        description: Reference to the validation rule (e.g., 'V-01') that was triggered.
      - name: message
        type: string
        required: true
        description: Human-readable error message to display inline near the field.
  - id: model-seed-data
    name: SeedData
    description: Pre-loaded test bookmarks injected into BookmarkStore on first app
      load if store is empty.
    fields:
      - name: entries
        type: CreateBookmarkInput[]
        required: true
        description: Array of 5 seed bookmark entries as defined in PRD Section 11.
