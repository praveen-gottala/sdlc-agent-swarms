# Delta Fixture: Add Recurring Frequency Badges to Expense Rows
#
# Scenario: Modify the dashboard's expense list to show a recurring frequency
# badge on expense rows that have a recurringTemplateId. Each badge is a small
# pill with a repeat icon and frequency label inside the row's meta container.
# Rows 1 (Rent) and 4 (Netflix) get badges; others remain unchanged.
#
# Source: Hand-crafted M3.6 delta (verified via deltaApply, 2026-05-16)
# Target page: dashboard (159 nodes, fixtures/personal-expense-tracker/agentforge/designs/dashboard.json)
# Applied result: 165 nodes (159 existing + 6 added)

metadata:
  description: Add recurring frequency badge pills to expense rows 1 (Rent) and 4 (Netflix)
  targetPage: dashboard
  taskId: cashpulse-transactions-list-modify-recurring-badge

delta:
  screenId: dashboard
  baseWidth: 1440

  added:
    expense-row-1-recurring-badge:
      parent: expense-row-1-meta
      order: 2
      type: container
      layout: { dir: row, align: center, gap: 4 }
      overrides:
        background: "rgba(59,130,246,0.1)"
        borderRadius: "9999px"
        paddingLeft: "6px"
        paddingRight: "6px"
        paddingTop: "2px"
        paddingBottom: "2px"

    expense-row-1-recurring-icon:
      parent: expense-row-1-recurring-badge
      order: 0
      catalog: icon
      overrides:
        name: repeat
        size: "12px"
        color: "var(--info)"

    expense-row-1-recurring-label:
      parent: expense-row-1-recurring-badge
      order: 1
      type: text
      content: Monthly
      typography: small
      color: info

    expense-row-4-recurring-badge:
      parent: expense-row-4-meta
      order: 2
      type: container
      layout: { dir: row, align: center, gap: 4 }
      overrides:
        background: "rgba(59,130,246,0.1)"
        borderRadius: "9999px"
        paddingLeft: "6px"
        paddingRight: "6px"
        paddingTop: "2px"
        paddingBottom: "2px"

    expense-row-4-recurring-icon:
      parent: expense-row-4-recurring-badge
      order: 0
      catalog: icon
      overrides:
        name: repeat
        size: "12px"
        color: "var(--info)"

    expense-row-4-recurring-label:
      parent: expense-row-4-recurring-badge
      order: 1
      type: text
      content: Monthly
      typography: small
      color: info

  modified: {}
  removed: []
  reordered: []

highlightNodes:
  - nodeId: expense-row-1-recurring-badge
    op: added
    description: "Recurring badge on Rent Payment row (Monthly)"
  - nodeId: expense-row-1-recurring-icon
    op: added
    description: "Repeat icon in Rent badge"
  - nodeId: expense-row-1-recurring-label
    op: added
    description: "Frequency label: Monthly"
  - nodeId: expense-row-4-recurring-badge
    op: added
    description: "Recurring badge on Netflix row (Monthly)"
  - nodeId: expense-row-4-recurring-icon
    op: added
    description: "Repeat icon in Netflix badge"
  - nodeId: expense-row-4-recurring-label
    op: added
    description: "Frequency label: Monthly"
