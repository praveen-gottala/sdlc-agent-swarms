# models.yaml — created on-demand, not by init
# schema: { version, models: [{ id, name, fields: [{ name, type }], db_table }] }
version: "1.0"
models:
  - id: claim
    name: Claim
    fields:
      - name: id
        type: string
      - name: claim_number
        type: string
      - name: status
        type: enum
        values:
          - draft
          - submitted
          - under_review
          - approved
          - denied
          - info_requested
          - escalated
          - closed
      - name: priority
        type: enum
        values:
          - low
          - medium
          - high
          - critical
      - name: policyholder_id
        type: string
      - name: policy_number
        type: string
      - name: incident_date
        type: date
      - name: filed_date
        type: datetime
      - name: incident_type
        type: enum
        values:
          - fire
          - water
          - wind
          - theft
          - vandalism
          - other
      - name: incident_description
        type: string
      - name: incident_street
        type: string
      - name: incident_city
        type: string
      - name: incident_state
        type: string
      - name: incident_zip
        type: string
      - name: estimated_damage
        type: number
      - name: approved_amount
        type: number
      - name: assigned_adjuster_id
        type: string
      - name: filed_by_id
        type: string
      - name: denial_reason
        type: string
      - name: escalation_reason
        type: string
      - name: info_request_message
        type: string
      - name: days_in_current_status
        type: number
      - name: sla_status
        type: enum
        values:
          - on_track
          - at_risk
          - breached
      - name: updated_at
        type: datetime
      - name: created_at
        type: datetime
    db_table: claims
  - id: policyholder
    name: Policyholder
    fields:
      - name: id
        type: string
      - name: full_name
        type: string
      - name: email
        type: string
      - name: phone
        type: string
      - name: address_street
        type: string
      - name: address_city
        type: string
      - name: address_state
        type: string
      - name: address_zip
        type: string
      - name: policy_number
        type: string
      - name: policy_type
        type: enum
        values:
          - basic
          - standard
          - premium
      - name: policy_start_date
        type: date
      - name: policy_end_date
        type: date
      - name: claims_history_count
        type: number
      - name: created_at
        type: datetime
    db_table: policyholders
  - id: document
    name: Document
    fields:
      - name: id
        type: string
      - name: claim_id
        type: string
      - name: filename
        type: string
      - name: file_type
        type: string
      - name: file_size
        type: number
      - name: file_url
        type: string
      - name: thumbnail_url
        type: string
      - name: uploaded_by
        type: string
      - name: uploaded_at
        type: datetime
      - name: category
        type: enum
        values:
          - photo
          - receipt
          - report
          - police_report
          - estimate
          - other
      - name: created_at
        type: datetime
    db_table: documents
  - id: note
    name: Note
    fields:
      - name: id
        type: string
      - name: claim_id
        type: string
      - name: author_id
        type: string
      - name: author_name
        type: string
      - name: author_avatar_url
        type: string
      - name: content
        type: string
      - name: type
        type: enum
        values:
          - internal
          - status_change
          - document_request
          - decision
      - name: created_at
        type: datetime
    db_table: notes
  - id: user
    name: User
    fields:
      - name: id
        type: string
      - name: name
        type: string
      - name: email
        type: string
      - name: role
        type: enum
        values:
          - agent
          - adjuster
          - manager
      - name: avatar_url
        type: string
      - name: active_claims_count
        type: number
      - name: avg_processing_days
        type: number
      - name: oldest_claim_age_days
        type: number
      - name: created_at
        type: datetime
    db_table: users
  - id: notification
    name: Notification
    fields:
      - name: id
        type: string
      - name: user_id
        type: string
      - name: claim_id
        type: string
      - name: type
        type: enum
        values:
          - claim_assigned
          - info_requested
          - claim_approved
          - claim_denied
          - claim_escalated
          - sla_warning
      - name: title
        type: string
      - name: description
        type: string
      - name: is_read
        type: boolean
      - name: action_required
        type: boolean
      - name: created_at
        type: datetime
    db_table: notifications
  - id: dashboard-stats
    name: DashboardStats
    fields:
      - name: id
        type: string
      - name: open_claims
        type: number
      - name: filed_today
        type: number
      - name: avg_processing_days
        type: number
      - name: sla_compliance_rate
        type: number
      - name: created_at
        type: datetime
    db_table: dashboard_stats_cache
  - id: pipeline-status-count
    name: PipelineStatusCount
    fields:
      - name: id
        type: string
      - name: status
        type: string
      - name: count
        type: number
      - name: created_at
        type: datetime
    db_table: pipeline_status_counts_cache
