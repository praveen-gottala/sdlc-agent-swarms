version: "1.0"
pages:
  - id: dashboard
    name: Dashboard
    route: /
    description: Main dashboard showing active tasks summary, team workload
      overview, and key metrics. Entry point of the application with navigation
      to all major sections.
    status: draft
    designStatus: draft
    components:
      - id: topbar
        type: NavigationBar
        description: Top navigation bar with TaskPilot logo, main nav links (Dashboard,
          Tasks), and bell icon for notifications
        props:
          logo: TaskPilot
          links:
            - Dashboard
            - Tasks
          actions:
            - NotificationBell
            - UserAvatar
      - id: dashboard-heading
        type: PageHeader
        description: Page heading 'Dashboard' with current date subtitle
        props:
          title: Dashboard
          subtitle: Today's overview
      - id: stats-row
        type: StatsCardRow
        description: "Row of 4 summary stat cards: Total Active Tasks, Completed Today,
          Overdue Tasks, Team Members"
        props:
          cards:
            - label: Active Tasks
              dataKey: activeTasks
            - label: Completed Today
              dataKey: completedToday
            - label: Overdue
              dataKey: overdueTasks
            - label: Team Members
              dataKey: teamMemberCount
      - id: active-tasks-list
        type: TaskCardList
        description: Scrollable list of active task cards showing task title, assignee
          avatar, priority badge, and due date. Clicking a card navigates to
          task detail.
        props:
          title: Active Tasks
          limit: 8
          showAssignee: true
          showPriority: true
          showDueDate: true
      - id: team-workload-chart
        type: WorkloadChart
        description: Bar chart or horizontal progress bars showing each team member's
          assigned task count vs capacity
        props:
          title: Team Workload
          chartType: horizontal-bar
      - id: create-task-fab
        type: FloatingActionButton
        description: Floating action button to create a new task, opens the task create page
        props:
          label: New Task
          icon: plus
    dataSources:
      - id: dashboard-stats
        endpoint: GET /api/dashboard/stats
        description: Fetch summary stats for the dashboard cards
      - id: active-tasks
        endpoint: GET /api/tasks?status=active&limit=8
        description: Fetch active tasks for the task list panel
      - id: team-workload
        endpoint: GET /api/dashboard/workload
        description: Fetch team workload data for the workload chart
    screen_type: page
    navigates_to:
      - target: task-list
        trigger: Click 'Tasks' in navigation bar
      - target: task-detail
        trigger: Click a task card in Active Tasks list
      - target: task-create
        trigger: Click New Task floating action button
      - target: notifications-drawer
        trigger: Click bell icon in top navigation bar
  - id: task-list
    name: Task List
    route: /tasks
    description: Full task list page with search, filter, and sort controls.
      Displays all tasks in a table or card grid view with status, priority,
      assignee, and due date columns.
    status: draft
    designStatus: draft
    components:
      - id: topbar
        type: NavigationBar
        description: Top navigation bar with TaskPilot logo, main nav links (Dashboard,
          Tasks), and bell icon for notifications
        props:
          logo: TaskPilot
          links:
            - Dashboard
            - Tasks
          actions:
            - NotificationBell
            - UserAvatar
      - id: task-list-header
        type: PageHeader
        description: Page title 'Tasks' with task count badge and a prominent 'New Task'
          button
        props:
          title: Tasks
          showCount: true
          primaryAction: New Task
      - id: filter-bar
        type: FilterBar
        description: Horizontal filter and search bar with text search input, Status
          dropdown filter, Priority dropdown filter, Assignee dropdown filter,
          and sort selector
        props:
          filters:
            - key: status
              label: Status
              options:
                - All
                - Todo
                - In Progress
                - Done
                - Archived
            - key: priority
              label: Priority
              options:
                - All
                - Low
                - Medium
                - High
                - Critical
            - key: assignee
              label: Assignee
              options: dynamic
          search: true
          sort:
            - Due Date
            - Priority
            - Created At
            - Title
      - id: task-table
        type: DataTable
        description: "Paginated table of tasks with columns: checkbox, Title, Status
          badge, Priority badge, Assignee avatar+name, Due Date, Actions
          (edit/delete). Row click navigates to task detail."
        props:
          columns:
            - select
            - title
            - status
            - priority
            - assignee
            - dueDate
            - actions
          pagination: true
          pageSize: 20
          selectable: true
      - id: bulk-action-bar
        type: BulkActionBar
        description: "Appears when rows are selected. Shows count of selected tasks and
          bulk action buttons: Mark Complete, Delete"
        props:
          actions:
            - Mark Complete
            - Delete Selected
    dataSources:
      - id: tasks
        endpoint: GET /api/tasks
        description: Fetch paginated, filtered, and sorted task list
      - id: team-members-filter
        endpoint: GET /api/users
        description: Fetch team members for the assignee filter dropdown
    screen_type: page
    navigates_to:
      - target: dashboard
        trigger: Click 'Dashboard' in navigation bar
      - target: task-detail
        trigger: Click a task row in the table
      - target: task-create
        trigger: Click 'New Task' button in page header
      - target: task-detail
        trigger: Click edit icon in task row actions
      - target: delete-confirmation-modal
        trigger: Click delete icon in task row actions
      - target: delete-confirmation-modal
        trigger: Click 'Delete Selected' in bulk action bar
      - target: notifications-drawer
        trigger: Click bell icon in top navigation bar
  - id: task-detail
    name: Task Detail
    route: /tasks/:taskId
    description: Full-page detail view for a single task. Shows all task fields,
      activity log, comments, and attachments. Allows inline editing of task
      fields and status transitions.
    status: draft
    designStatus: draft
    components:
      - id: topbar
        type: NavigationBar
        description: Top navigation bar with TaskPilot logo, main nav links (Dashboard,
          Tasks), and bell icon for notifications
        props:
          logo: TaskPilot
          links:
            - Dashboard
            - Tasks
          actions:
            - NotificationBell
            - UserAvatar
      - id: breadcrumb
        type: Breadcrumb
        description: "Breadcrumb trail: Home > Tasks > [Task Title]"
        props:
          items:
            - Dashboard
            - Tasks
            - taskTitle
      - id: task-detail-header
        type: DetailHeader
        description: "Task title (editable inline), status badge with dropdown to change
          status, priority badge, and action buttons: Edit, Delete, Back"
        props:
          editableTitle: true
          showStatusDropdown: true
          actions:
            - Edit
            - Delete
      - id: task-meta-panel
        type: MetaPanel
        description: "Sidebar panel showing task metadata: Assignee (avatar + name with
          edit), Due Date (with date picker), Priority selector, Created By,
          Created At, Updated At, Tags"
        props:
          fields:
            - assignee
            - dueDate
            - priority
            - createdBy
            - createdAt
            - updatedAt
            - tags
      - id: task-description
        type: RichTextEditor
        description: Task description area with rich text display and inline edit toggle
        props:
          editable: true
          placeholder: Add a description...
      - id: subtasks-section
        type: SubtaskList
        description: Checklist of subtasks with add subtask input and checkbox
          completion toggles
        props:
          addable: true
          checkable: true
      - id: comments-section
        type: CommentThread
        description: Activity and comment thread showing chronological comments with
          author avatar, timestamp, and comment text. Includes a comment input
          box at the bottom.
        props:
          showActivity: true
          inputPlaceholder: Add a comment...
    dataSources:
      - id: task-detail-data
        endpoint: GET /api/tasks/:taskId
        description: Fetch full task detail by ID
      - id: task-comments
        endpoint: GET /api/tasks/:taskId/comments
        description: Fetch comments and activity log for the task
      - id: update-task
        endpoint: PUT /api/tasks/:taskId
        description: Update task fields (inline edits, status change)
      - id: add-comment
        endpoint: POST /api/tasks/:taskId/comments
        description: Post a new comment on the task
    screen_type: page
    navigates_to:
      - target: task-list
        trigger: Click 'Tasks' in breadcrumb or navigation bar
      - target: dashboard
        trigger: Click 'Dashboard' in navigation bar or breadcrumb
      - target: task-create
        trigger: Click 'Edit' button to open edit form
      - target: delete-confirmation-modal
        trigger: Click 'Delete' button in detail header
      - target: notifications-drawer
        trigger: Click bell icon in top navigation bar
  - id: task-create
    name: Create / Edit Task
    route: /tasks/new
    description: Full-page form to create a new task or edit an existing one.
      Includes all task fields with validation. Reused for both create (POST)
      and edit (PUT) operations.
    status: draft
    designStatus: draft
    components:
      - id: topbar
        type: NavigationBar
        description: Top navigation bar with TaskPilot logo, main nav links, and bell icon
        props:
          logo: TaskPilot
          links:
            - Dashboard
            - Tasks
          actions:
            - NotificationBell
            - UserAvatar
      - id: form-header
        type: PageHeader
        description: Page title 'Create Task' or 'Edit Task' depending on mode, with
          Cancel and Save buttons in the header
        props:
          titleCreate: Create Task
          titleEdit: Edit Task
          actions:
            - Cancel
            - Save Task
      - id: task-form
        type: Form
        description: "Task creation/edit form with fields: Title (text input, required),
          Description (rich text editor), Status (select), Priority (select),
          Assignee (user search/select), Due Date (date picker), Tags
          (multi-input)"
        props:
          fields:
            - name: title
              type: text
              required: true
              placeholder: Task title...
            - name: description
              type: richtext
              required: false
            - name: status
              type: select
              options:
                - Todo
                - In Progress
                - Done
                - Archived
            - name: priority
              type: select
              options:
                - Low
                - Medium
                - High
                - Critical
            - name: assigneeId
              type: user-select
              label: Assignee
            - name: dueDate
              type: date
              label: Due Date
            - name: tags
              type: multi-tag
              label: Tags
          validation: true
          submitLabel: Save Task
    dataSources:
      - id: create-task
        endpoint: POST /api/tasks
        description: Create a new task
      - id: edit-task
        endpoint: PUT /api/tasks/:taskId
        description: Update existing task (edit mode)
      - id: users-list
        endpoint: GET /api/users
        description: Fetch users for assignee selector
    screen_type: page
    navigates_to:
      - target: task-list
        trigger: Click 'Cancel' button
      - target: task-detail
        trigger: Click 'Save Task' button successfully
      - target: dashboard
        trigger: Click 'Dashboard' in navigation bar
      - target: notifications-drawer
        trigger: Click bell icon in top navigation bar
  - id: notifications-drawer
    name: Notifications Drawer
    route: /notifications-drawer
    description: "A right-side drawer panel that slides in when the bell icon is
      clicked from any page. Displays a list of notifications: task assignments,
      comments, due date reminders, and status changes. Notifications can be
      marked as read individually or all at once."
    status: draft
    designStatus: draft
    components:
      - id: drawer-header
        type: DrawerHeader
        description: Drawer title 'Notifications' with unread count badge and a 'Mark
          all as read' text button. Close (X) button on the right.
        props:
          title: Notifications
          showUnreadCount: true
          actions:
            - Mark all as read
            - Close
      - id: notification-filter-tabs
        type: TabBar
        description: "Tabs to filter notifications: All, Unread, Mentions"
        props:
          tabs:
            - All
            - Unread
            - Mentions
      - id: notification-list
        type: NotificationList
        description: "Scrollable list of notification items. Each item shows: icon type
          (assignment/comment/due/status), message text, relative timestamp, and
          unread indicator dot. Click navigates to relevant task."
        props:
          showTypeIcon: true
          showTimestamp: true
          showUnreadDot: true
          emptyState: You're all caught up!
    dataSources:
      - id: notifications
        endpoint: GET /api/notifications
        description: Fetch notifications for the current user
      - id: mark-read
        endpoint: PUT /api/notifications/read
        description: Mark one or all notifications as read
    screen_type: drawer
    navigates_to:
      - target: task-detail
        trigger: Click a notification item to view the related task
  - id: delete-confirmation-modal
    name: Delete Confirmation Dialog
    route: /delete-confirmation-dialog
    description: A centered modal overlay dialog asking the user to confirm deletion
      of a task. Displays the task title for clarity and provides Cancel and
      Delete action buttons.
    status: draft
    designStatus: draft
    components:
      - id: modal-icon
        type: Icon
        description: Warning/trash icon in coral-accent color at the top of the modal
        props:
          icon: trash
          color: coral-accent
          size: 40
      - id: modal-title
        type: Heading
        description: "Modal heading: 'Delete Task?'"
        props:
          text: Delete Task?
          level: 2
      - id: modal-body
        type: Text
        description: "Confirmation message: 'Are you sure you want to delete \"[Task
          Title]\"? This action cannot be undone.'"
        props:
          template: Are you sure you want to delete "{taskTitle}"? This action cannot be
            undone.
      - id: modal-actions
        type: ButtonGroup
        description: "Two buttons side by side: 'Cancel' (secondary/outlined) and
          'Delete Task' (destructive/coral-accent fill)"
        props:
          buttons:
            - label: Cancel
              variant: secondary
            - label: Delete Task
              variant: destructive
          alignment: right
    dataSources:
      - id: delete-task
        endpoint: DELETE /api/tasks/:taskId
        description: Delete the task after confirmation
    screen_type: modal
    navigates_to:
      - target: task-list
        trigger: Click 'Delete Task' button (successful deletion)
      - target: task-list
        trigger: Click 'Cancel' button
