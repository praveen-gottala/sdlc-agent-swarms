# api.yaml — created on-demand, not by init
# schema: { version, base_url, endpoints: [{ id, method, path, description, auth, status }] }
version: "1.0"
base_url: /api
endpoints:
  - id: calculate-split
    method: POST
    path: /api/calculate
    description: Accepts bill inputs and returns computed split results for all people. Handles both equal and custom split
      modes. Applies proportional tax and tip distribution, rounds to 2 decimal places, and assigns any rounding error
      to the first person. Returns the full SplitResult array along with computed grand total and per-person breakdowns.
    query_params: []
    response:
      type: object
      schema_ref: SplitResult
    auth: none
    status: planned
  - id: encode-share-url
    method: POST
    path: /api/share/encode
    description: Accepts a BillState and array of PersonEntries, encodes them into a compact, URL-safe query string
      representation, and returns the full shareable URL pointing to /result. Optionally shortens the URL if the encoded
      payload exceeds a threshold. Also logs a ShareEvent for analytics.
    query_params: []
    response:
      type: object
      schema_ref: ShareEvent
    auth: none
    status: planned
  - id: decode-share-url
    method: GET
    path: /api/share/decode
    description: Accepts an encoded payload from URL query params and decodes it back into a BillState and SplitResult
      array. Used by the /result page to reconstruct the breakdown from a shared link without any server-side
      persistence.
    query_params:
      - name: payload
        type: string
      - name: v
        type: string
    response:
      type: object
      schema_ref: BillState
    auth: none
    status: planned
  - id: log-share-event
    method: POST
    path: /api/analytics/share
    description: Logs a privacy-friendly share event for analytics purposes. Captures split_mode, people_count, grand_total
      range bucket, and share_method (native_share or clipboard). No PII is stored. Used to track the share rate success
      metric.
    query_params: []
    response:
      type: object
      schema_ref: ShareEvent
    auth: none
    status: planned
  - id: get-tip-presets
    method: GET
    path: /api/config/tip-presets
    description: Returns the list of tip percentage presets to display in the segmented control on Screen 1. Allows presets
      to be updated server-side without a client deploy. Returns an array of objects with value (number) and label
      (string) fields.
    query_params: []
    response:
      type: array
      schema_ref: BillState
    auth: none
    status: planned
