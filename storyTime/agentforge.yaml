version: "1.0"
project:
  name: storyTime
  id: proj_storytime_rea0dy
  description: tell stories to children
  platforms:
    - web
stack:
  frontend: react
  backend: node
  database: postgresql
  styling: tailwind
repo:
  provider: github
  org: ""
  name: storyTime
agents:
  providers:
    default: claude-sonnet-4
    overrides:
      architecture: claude-opus-4
      code_review: claude-haiku-4
  sandbox:
    type: github_actions
    timeout_minutes: 15
    max_retries: 3
  orchestration:
    max_concurrent_agents: 3
    ci_wait_strategy: spawn_next
hitl:
  default: review_and_override
  overrides:
    design: full_approval
    production_deploy: full_approval
    test_generation: notify_only
channels:
  - type: slack
    capabilities: full
    priority: 1
  - type: telegram
    capabilities: approvals
    priority: 2
  - type: cli
    capabilities: basic
    priority: 3
routing:
  approval_requests: all
  status_updates: primary
  critical_alerts: all
budget:
  per_task_max_usd: 2
  per_phase_max_usd: 25
  monthly_max_usd: 200
  alert_threshold: 0.8
