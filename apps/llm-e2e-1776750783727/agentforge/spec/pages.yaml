version: "1.0"
pages:
  - id: dashboard
    name: Dashboard
    route: /
    description: Main dashboard showing active tasks summary, team workload
      overview, and key metrics. Entry point of the app with navigation to task
      list and individual task details.
    status: draft
    designStatus: draft
    components:
      - id: top-nav
        type: NavigationBar
        description: Top navigation bar with TaskPilot logo, main nav links (Dashboard,
          Tasks), and bell icon for notifications
        props:
          logo: TaskPilot
          links:
            - Dashboard
            - Tasks
          actions:
            - NotificationBell
      - id: dashboard-heading
        type: PageHeader
        description: Page heading 'Dashboard' with subtitle showing current date and
          logged-in user greeting
        props:
          title: Dashboard
          subtitle: Good morning, {userName}
      - id: stats-row
        type: StatCardRow
        description: "Row of 4 stat cards: Total Active Tasks, Completed Today, Overdue
          Tasks, Team Members"
        props:
          cards:
            - label: Active Tasks
              dataKey: activeTasks
            - label: Completed Today
              dataKey: completedToday
            - label: Overdue
              dataKey: overdueTasks
            - label: Team Members
              dataKey: teamCount
      - id: active-tasks-panel
        type: TaskList
        description: Scrollable list of active tasks showing task name, assignee avatar,
          priority badge, and due date. Limited to top 8 tasks.
        props:
          limit: 8
          filter: active
          showAssignee: true
          showPriority: true
          showDueDate: true
          clickable: true
      - id: team-workload-panel
        type: WorkloadChart
        description: Horizontal bar chart showing each team member's task count and
          workload percentage
        props:
          chartType: horizontal-bar
          dataKey: teamWorkload
      - id: view-all-tasks-btn
        type: Button
        description: Button linking to the full task list page
        props:
          label: View All Tasks
          variant: primary
    dataSources:
      - id: dashboard-stats
        endpoint: GET /api/dashboard/stats
        description: Fetches aggregate stats for stat cards
      - id: active-tasks
        endpoint: GET /api/tasks?status=active&limit=8
        description: Fetches top 8 active tasks for dashboard panel
      - id: team-workload
        endpoint: GET /api/dashboard/team-workload
        description: Fetches per-member task counts for workload chart
    screen_type: page
    navigates_to:
      - target: task-list
        trigger: Click 'View All Tasks' button
        mode: overlay
      - target: task-list
        trigger: Click 'Tasks' in navigation bar
      - target: task-detail
        trigger: Click a task row in Active Tasks panel
      - target: notifications-drawer
        trigger: Click bell icon in navigation bar
  - id: task-list
    name: Task List
    route: /tasks
    description: Full paginated list of tasks with filter controls for status,
      priority, assignee, and due date. Supports search. Each task row links to
      the task detail page.
    status: draft
    designStatus: draft
    components:
      - id: top-nav
        type: NavigationBar
        description: Top navigation bar with TaskPilot logo, main nav links (Dashboard,
          Tasks), and bell icon for notifications
        props:
          logo: TaskPilot
          links:
            - Dashboard
            - Tasks
          actions:
            - NotificationBell
      - id: page-header
        type: PageHeader
        description: Page heading 'Tasks' with a 'Create Task' primary button on the right
        props:
          title: Tasks
          action:
            label: Create Task
            variant: primary
      - id: filter-bar
        type: FilterBar
        description: Horizontal filter row with search input, status dropdown, priority
          dropdown, assignee dropdown, and due date range picker
        props:
          filters:
            - search
            - status
            - priority
            - assignee
            - dueDateRange
      - id: task-table
        type: DataTable
        description: "Paginated table of tasks with columns: Task Name, Assignee,
          Priority, Status, Due Date, and Actions (Edit, Delete)"
        props:
          columns:
            - name
            - assignee
            - priority
            - status
            - dueDate
            - actions
          pagination: true
          rowClickable: true
      - id: pagination-controls
        type: Pagination
        description: Page navigation controls at bottom of task table
        props:
          pageSize: 20
    dataSources:
      - id: tasks-list
        endpoint: GET /api/tasks
        description: Fetches paginated and filtered list of tasks
      - id: team-members
        endpoint: GET /api/users
        description: Fetches team members for assignee filter dropdown
    screen_type: page
    navigates_to:
      - target: dashboard
        trigger: Click 'Dashboard' in navigation bar
      - target: task-detail
        trigger: Click a task row in task table
      - target: task-detail
        trigger: Click Edit action on a task row
      - target: delete-confirmation-modal
        trigger: Click Delete action on a task row
      - target: notifications-drawer
        trigger: Click bell icon in navigation bar
  - id: task-detail
    name: Task Detail
    route: /tasks/:taskId
    description: Full detail view of a single task. Shows all task fields,
      description, assignee, priority, status, due date, comments/activity feed,
      and action buttons for editing and deleting the task.
    status: draft
    designStatus: draft
    components:
      - id: top-nav
        type: NavigationBar
        description: Top navigation bar with TaskPilot logo, main nav links (Dashboard,
          Tasks), and bell icon for notifications
        props:
          logo: TaskPilot
          links:
            - Dashboard
            - Tasks
          actions:
            - NotificationBell
      - id: breadcrumb
        type: Breadcrumb
        description: "Breadcrumb navigation: Home > Tasks > Task Name"
        props:
          items:
            - Dashboard
            - Tasks
            - "{taskName}"
      - id: task-header
        type: DetailHeader
        description: "Task title as heading-1, with status badge, priority badge, and
          action buttons: Edit Task and Delete Task"
        props:
          titleKey: name
          badges:
            - status
            - priority
          actions:
            - label: Edit Task
              variant: secondary
            - label: Delete Task
              variant: danger
      - id: task-meta
        type: MetaGrid
        description: Two-column meta section showing Assignee (avatar + name), Due Date,
          Created At, Created By, and Last Updated
        props:
          fields:
            - assignee
            - dueDate
            - createdAt
            - createdBy
            - updatedAt
      - id: task-description
        type: RichTextDisplay
        description: Full task description rendered in body text style
        props:
          dataKey: description
      - id: status-update
        type: StatusSelector
        description: Inline status update control allowing quick status change without
          navigating away
        props:
          options:
            - Todo
            - In Progress
            - In Review
            - Done
          currentKey: status
      - id: activity-feed
        type: ActivityFeed
        description: Chronological list of task comments and status change history. Each
          item shows author avatar, content, and timestamp.
        props:
          dataKey: comments
          showHistory: true
      - id: comment-input
        type: CommentInput
        description: Text area and submit button to add a new comment to the task
        props:
          placeholder: Add a comment...
          submitLabel: Post Comment
    dataSources:
      - id: task-detail-data
        endpoint: GET /api/tasks/:taskId
        description: Fetches full task detail by ID
      - id: task-comments
        endpoint: GET /api/tasks/:taskId/comments
        description: Fetches comments and activity history for the task
    screen_type: page
    navigates_to:
      - target: task-list
        trigger: Click 'Tasks' in breadcrumb or navigation bar
      - target: dashboard
        trigger: Click 'Dashboard' in navigation bar or breadcrumb
      - target: delete-confirmation-modal
        trigger: Click 'Delete Task' button
      - target: notifications-drawer
        trigger: Click bell icon in navigation bar
  - id: notifications-drawer
    name: Notifications Drawer
    route: /notifications-drawer
    description: Right-side sliding drawer showing recent notifications for the
      logged-in user. Slides in from the right when the bell icon is clicked.
      Includes unread count badge, notification items with mark-as-read, and a
      clear-all button.
    status: draft
    designStatus: draft
    components:
      - id: drawer-header
        type: DrawerHeader
        description: Drawer title 'Notifications' with unread count badge and a close
          (X) button
        props:
          title: Notifications
          showUnreadCount: true
          closeable: true
      - id: mark-all-read-btn
        type: Button
        description: Text button to mark all notifications as read
        props:
          label: Mark all as read
          variant: ghost
      - id: notifications-list
        type: NotificationList
        description: Scrollable list of notification items. Each item shows icon,
          message text, relative timestamp, and a dot indicator for unread
          status. Clicking a notification marks it read and navigates to the
          relevant task.
        props:
          dataKey: notifications
          clickable: true
          showUnreadDot: true
      - id: empty-state
        type: EmptyState
        description: Empty state illustration and message shown when there are no
          notifications
        props:
          message: You're all caught up!
          illustration: check-circle
    dataSources:
      - id: notifications-data
        endpoint: GET /api/notifications
        description: Fetches notifications for the current user
    screen_type: drawer
    navigates_to:
      - target: task-detail
        trigger: Click a notification item referencing a task
  - id: delete-confirmation-modal
    name: Delete Confirmation
    route: /delete-confirmation
    description: Centered modal overlay asking the user to confirm deletion of a
      task. Shows task name, a warning message, and Cancel / Delete buttons.
      Appears on top of the current page.
    status: draft
    designStatus: draft
    components:
      - id: modal-header
        type: ModalHeader
        description: Modal title 'Delete Task' with a close (X) icon button in the
          top-right corner
        props:
          title: Delete Task
          closeable: true
      - id: warning-message
        type: AlertBanner
        description: "Warning message: 'Are you sure you want to delete \"{taskName}\"?
          This action cannot be undone.'"
        props:
          variant: error
          icon: warning-triangle
          messageTemplate: Are you sure you want to delete "{taskName}"? This action
            cannot be undone.
      - id: modal-actions
        type: ButtonGroup
        description: "Two action buttons: 'Cancel' (secondary/ghost) and 'Delete Task'
          (danger/primary) aligned to the right"
        props:
          alignment: right
          buttons:
            - label: Cancel
              variant: secondary
            - label: Delete Task
              variant: danger
    dataSources: []
    screen_type: modal
    navigates_to:
      - target: task-list
        trigger: Click 'Delete Task' confirm button — deletes task and returns to list
      - target: task-list
        trigger: Click 'Cancel' button — dismisses modal
