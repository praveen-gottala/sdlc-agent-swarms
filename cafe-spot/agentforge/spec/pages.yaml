version: "1.0"
pages:
  - id: home
    name: Home
    description: Landing page showcasing featured coffee products, brand story, and key value propositions with hero section
      and product highlights
    route: /
    status: approved
    components:
      - HeroSection
      - FeaturedProducts
      - ValuePropositions
      - NavigationHeader
      - Footer
      - NewsletterSignup
    data_sources:
      - Product
      - Category
  - id: product-catalog
    name: Product Catalog
    description: Browse all coffee products with search, filtering by roast level, grind type, and price, plus sorting options
    route: /products
    status: approved
    components:
      - ProductGrid
      - SearchBar
      - FilterSidebar
      - SortDropdown
      - NavigationHeader
      - Footer
      - PaginationControls
    data_sources:
      - Product
      - Category
      - Review
  - id: product-detail
    name: Product Detail
    description: Detailed product page with images, descriptions, origin story, customer reviews, and add to cart functionality
    route: /products/:id
    status: approved
    components:
      - ProductImageGallery
      - ProductInfo
      - AddToCartForm
      - ReviewsList
      - ReviewForm
      - RelatedProducts
      - NavigationHeader
      - Footer
    data_sources:
      - Product
      - Review
      - CartItem
  - id: shopping-cart
    name: Shopping Cart
    description: View and manage cart items, update quantities, apply promo codes, and proceed to checkout
    route: /cart
    status: approved
    components:
      - CartItemList
      - CartSummary
      - PromoCodeInput
      - CheckoutButton
      - NavigationHeader
      - Footer
      - ContinueShoppingLink
    data_sources:
      - CartItem
      - Product
      - PromoCode
  - id: checkout
    name: Checkout
    description: Complete purchase with shipping information, payment details, order review, and confirmation
    route: /checkout
    status: approved
    components:
      - CheckoutForm
      - OrderSummary
      - PaymentForm
      - ShippingForm
      - OrderConfirmation
      - NavigationHeader
      - Footer
    data_sources:
      - Order
      - CartItem
      - User
      - Address
  - id: user-account
    name: User Account
    description: User dashboard with order history, profile management, saved addresses, and review management
    route: /account
    status: approved
    components:
      - AccountNavigation
      - OrderHistory
      - ProfileForm
      - AddressBook
      - ReviewHistory
      - NavigationHeader
      - Footer
    data_sources:
      - User
      - Order
      - Address
      - Review
