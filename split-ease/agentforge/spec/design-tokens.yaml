version: "1.0"
created_by: agentforge-init-llm
colors:
  primitive:
    warm-cream: "#FFF8E7"
    deep-teal: "#0F6E56"
    coral-accent: "#E8593C"
    warm-gray: "#444441"
    soft-white: "#FAFAF8"
    warm-gray-light: "#9C9C97"
  semantic:
    background-primary: warm-cream
    surface-primary: warm-cream
    surface-elevated: soft-white
    text-primary: warm-gray
    text-secondary: warm-gray-light
    text-disabled: warm-gray-light
    text-on-cta: warm-cream
    cta-primary: deep-teal
    cta-hover: deep-teal
    border-default: warm-gray-light
    border-focus: deep-teal
    border-error: coral-accent
    error: coral-accent
    success: deep-teal
    warning: coral-accent
    info: deep-teal
    overlay: rgba(0,0,0,0.5)
    surface-secondary: soft-white
typography:
  font_families:
    display: Nunito
    body: Open Sans
  scale:
    - role: heading-1
      size: 32
      weight: 700
      family: display
      line_height: 1.2
    - role: heading-2
      size: 24
      weight: 700
      family: display
      line_height: 1.25
    - role: heading-3
      size: 18
      weight: 600
      family: display
      line_height: 1.3
    - role: body
      size: 14
      weight: 400
      family: body
      line_height: 1.5
    - role: label
      size: 12
      weight: 500
      family: body
      line_height: 1.4
    - role: small
      size: 11
      weight: 400
      family: body
      line_height: 1.4
spacing:
  unit: 8
  scale:
    - 4
    - 8
    - 12
    - 16
    - 24
    - 32
    - 48
    - 64
borders:
  radius:
    small: 8
    medium: 12
    large: 16
    pill: 9999
touch_targets:
  minimum_height: 44
  minimum_width: 44
elevation:
  levels:
    - level: 0
      shadow: none
      description: Flat, no elevation
    - level: 1
      shadow: 0 2px 8px rgba(15,110,86,0.06)
      description: Cards resting on surface
    - level: 2
      shadow: 0 4px 16px rgba(15,110,86,0.10)
      description: Dropdowns, popovers
    - level: 3
      shadow: 0 8px 32px rgba(15,110,86,0.14)
      description: Modals, dialogs
layout:
  grid:
    columns: 12
    gutter: 24
    margin: 24
  content_max_width: 1280
  breakpoints:
    mobile: 640
    tablet: 768
    desktop: 1024
    wide: 1440
z_index:
  dropdown: 1000
  sticky: 1100
  modal: 1200
  toast: 1300
  tooltip: 1400
