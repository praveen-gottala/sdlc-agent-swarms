version: "1.0"
created_by: agentforge-init-llm
colors:
  primitive:
    linen-50: "#FAFAF7"
    linen-100: "#F4F1EB"
    linen-200: "#E8E2D9"
    sage-500: "#5C8A6E"
    sage-600: "#4A7259"
    terracotta-400: "#D4735A"
    terracotta-600: "#B85A41"
    marigold-400: "#E8A838"
    sky-500: "#4A90B8"
    charcoal-900: "#1C1917"
    charcoal-500: "#78716C"
    charcoal-300: "#C4BAB2"
  semantic:
    background-primary: linen-50
    surface-primary: linen-100
    surface-elevated: linen-50
    surface-secondary: linen-200
    surface-input: linen-50
    text-primary: charcoal-900
    text-secondary: charcoal-500
    text-disabled: charcoal-300
    text-on-cta: linen-50
    cta-primary: sage-500
    cta-hover: sage-600
    border-default: linen-200
    border-focus: sage-500
    border-error: terracotta-400
    error: terracotta-400
    success: sage-500
    warning: marigold-400
    info: sky-500
    overlay: rgba(28, 25, 23, 0.40)
typography:
  font_families:
    display: Sora
    body: Source Sans 3
  scale:
    - role: heading-1
      size: 32
      weight: 700
      family: display
      line_height: 1.2
    - role: heading-2
      size: 24
      weight: 700
      family: display
      line_height: 1.25
    - role: heading-3
      size: 18
      weight: 600
      family: display
      line_height: 1.3
    - role: body
      size: 14
      weight: 400
      family: body
      line_height: 1.5
    - role: label
      size: 12
      weight: 500
      family: body
      line_height: 1.4
    - role: small
      size: 11
      weight: 400
      family: body
      line_height: 1.4
spacing:
  unit: 8
  scale:
    - 4
    - 8
    - 12
    - 16
    - 24
    - 32
    - 48
    - 64
borders:
  radius:
    small: 8
    medium: 12
    large: 16
    pill: 9999
touch_targets:
  minimum_height: 44
  minimum_width: 44
elevation:
  levels:
    - level: 0
      shadow: none
      description: Flat — used for inline text, linen-on-linen surfaces that rely on
        border separation
    - level: 1
      shadow: 0 1px 4px rgba(28, 25, 23, 0.07), 0 1px 2px rgba(28, 25, 23, 0.05)
      description: Cards at rest — barely-there warm shadow, like paper resting on a desk
    - level: 2
      shadow: 0 4px 12px rgba(28, 25, 23, 0.10), 0 2px 4px rgba(28, 25, 23, 0.06)
      description: Card hover and dropdowns — gentle lift, still organic and soft
    - level: 3
      shadow: 0 8px 32px rgba(28, 25, 23, 0.14), 0 2px 8px rgba(28, 25, 23, 0.08)
      description: Modals and toasts — elevated presence without harshness, warm and
        grounded
layout:
  grid:
    columns: 12
    gutter: 24
    margin: 24
  content_max_width: 1280
  breakpoints:
    mobile: 640
    tablet: 768
    desktop: 1024
    wide: 1440
z_index:
  dropdown: 1000
  sticky: 1100
  modal: 1200
  toast: 1300
  tooltip: 1400
opacity:
  scale:
    subtle: 0.1
    muted: 0.3
    disabled: 0.38
    overlay: 0.5
motion:
  durations:
    fast: 100
    normal: 200
    slow: 400
    page: 600
  easings:
    default: ease-out
    emphasized: cubic-bezier(0.2,0,0,1)
state:
  hover_opacity: 0.08
  disabled_opacity: 0.38
  focus_ring:
    color: cta-primary
    width: 2
    offset: 2
