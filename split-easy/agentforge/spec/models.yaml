# models.yaml — created on-demand, not by init
# schema: { version, models: [{ id, name, fields: [{ name, type }], db_table }] }
version: "1.0"
models:
  - id: bill-state
    name: BillState
    fields:
      - name: id
        type: string
      - name: subtotal
        type: number
      - name: tax_amount
        type: number
      - name: tip_percent
        type: number
      - name: tip_amount
        type: number
      - name: grand_total
        type: number
      - name: split_mode
        type: string
      - name: people_count
        type: number
      - name: currency_code
        type: string
      - name: created_at
        type: datetime
      - name: session_id
        type: string
    db_table: bill_states
  - id: person-entry
    name: PersonEntry
    fields:
      - name: id
        type: string
      - name: bill_state_id
        type: string
      - name: name
        type: string
      - name: sort_order
        type: number
      - name: custom_subtotal
        type: number
      - name: created_at
        type: datetime
    db_table: person_entries
  - id: split-result
    name: SplitResult
    fields:
      - name: id
        type: string
      - name: bill_state_id
        type: string
      - name: person_id
        type: string
      - name: person_name
        type: string
      - name: subtotal_share
        type: number
      - name: tax_share
        type: number
      - name: tip_share
        type: number
      - name: total_share
        type: number
      - name: share_ratio
        type: number
      - name: rounding_adjustment
        type: number
      - name: created_at
        type: datetime
    db_table: split_results
  - id: share-event
    name: ShareEvent
    fields:
      - name: id
        type: string
      - name: bill_state_id
        type: string
      - name: share_method
        type: string
      - name: people_count
        type: number
      - name: split_mode
        type: string
      - name: grand_total
        type: number
      - name: created_at
        type: datetime
    db_table: share_events
