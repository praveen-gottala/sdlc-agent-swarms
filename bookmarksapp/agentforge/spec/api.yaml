version: "1.0"
endpoints:
  - method: GET
    path: /api/bookmarks
    description: "Returns all bookmarks sorted by createdAt descending. Supports
      optional query parameters: 'search' (case-insensitive substring match on
      title and url) and 'tags' (comma-separated, AND logic — returns bookmarks
      containing ALL specified tags). Client-side filtering is preferred for
      real-time UX; this endpoint supports server-side fallback."
    queryParams:
      - name: search
        type: string
        required: false
        description: Case-insensitive substring filter applied to title and url fields.
      - name: tags
        type: string
        required: false
        description: Comma-separated list of tags. Returns only bookmarks that contain
          ALL specified tags (AND logic).
    response:
      "200":
        type: Bookmark[]
        description: Array of bookmark objects matching the optional filters.
  - method: GET
    path: /api/bookmarks/tags
    description: Returns a deduplicated, alphabetically sorted array of all unique
      tags across all bookmarks. Used to populate the TagFilterChips component
      on the home screen.
    response:
      "200":
        type: string[]
        description: Sorted array of unique tag strings.
  - method: GET
    path: /api/bookmarks/:id
    description: Returns a single bookmark by its UUID. Used by the edit form and
      detail page to pre-fill or display data.
    pathParams:
      - name: id
        type: string
        format: uuid
        required: true
    response:
      "200":
        type: Bookmark
        description: The bookmark object with the given id.
      "404":
        type: ErrorResponse
        description: Bookmark with the given id does not exist.
  - method: POST
    path: /api/bookmarks
    description: Creates a new bookmark. Generates a UUID v4 id and sets createdAt
      and updatedAt to the current ISO 8601 timestamp. Validates all fields
      server-side (mirrors client-side validation rules V-01 through V-08).
      Returns the created bookmark.
    requestBody:
      type: CreateBookmarkInput
      required: true
    response:
      "201":
        type: Bookmark
        description: The newly created bookmark with server-generated id, createdAt, and
          updatedAt.
      "400":
        type: ValidationErrorResponse
        description: One or more validation rules failed. Returns field-level error details.
  - method: PUT
    path: /api/bookmarks/:id
    description: Updates an existing bookmark by id. Accepts a partial update
      payload. Updates the updatedAt timestamp to the current ISO 8601
      timestamp. Validates provided fields server-side. Returns the updated
      bookmark.
    pathParams:
      - name: id
        type: string
        format: uuid
        required: true
    requestBody:
      type: UpdateBookmarkInput
      required: true
    response:
      "200":
        type: Bookmark
        description: The updated bookmark with refreshed updatedAt timestamp.
      "400":
        type: ValidationErrorResponse
        description: One or more validation rules failed.
      "404":
        type: ErrorResponse
        description: Bookmark with the given id does not exist.
  - method: DELETE
    path: /api/bookmarks/:id
    description: Deletes a bookmark by its UUID. Called after the user confirms the
      inline delete confirmation on the BookmarkCard or detail page. Returns 204
      No Content on success.
    pathParams:
      - name: id
        type: string
        format: uuid
        required: true
    response:
      "204":
        type: "null"
        description: Bookmark successfully deleted. No response body.
      "404":
        type: ErrorResponse
        description: Bookmark with the given id does not exist.
  - method: POST
    path: /api/bookmarks/seed
    description: Development-only endpoint. Seeds the database with the 5 predefined
      test bookmarks from the PRD seed data. Idempotent — skips any seed entry
      whose URL already exists. Returns the list of created bookmarks.
    response:
      "201":
        type: Bookmark[]
        description: Array of bookmarks that were created during seeding (skips duplicates).
