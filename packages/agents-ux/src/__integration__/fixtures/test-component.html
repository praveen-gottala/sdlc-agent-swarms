<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monthly Cost Summary</title>
</head>
<body style="margin: 0; padding: 24px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5;">
  <div
    role="region"
    aria-label="Monthly cost summary"
    aria-describedby="cost-description"
    style="max-width: 400px; background: #ffffff; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);"
  >
    <h2 style="margin: 0 0 8px 0; font-size: 18px; font-weight: 600; color: #1a1a1a;">Total Cost</h2>
    <p id="cost-description" style="margin: 0 0 16px 0; font-size: 14px; color: #666;">Your estimated monthly spending across all services.</p>
    <span class="metric" style="font-size: 36px; font-weight: 700; color: #0066cc;">$47.50</span>
  </div>
</body>
</html>
