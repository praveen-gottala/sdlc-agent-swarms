version: "1.0"
endpoints:
  - method: GET
    path: /api/tasks
    description: "List tasks with optional filters: status, priority, assigneeId,
      dueDate range, search query, page, limit, sort. Returns paginated task
      list with assignee user details."
  - method: POST
    path: /api/tasks
    description: "Create a new task. Request body: title (required), description,
      assigneeId, priority, status, dueDate, tags."
  - method: GET
    path: /api/tasks/:taskId
    description: Retrieve a single task by ID including assignee user details.
  - method: PATCH
    path: /api/tasks/:taskId
    description: "Update an existing task. Partial update allowed. Request body may
      include: title, description, assigneeId, priority, status, dueDate, tags."
  - method: DELETE
    path: /api/tasks/:taskId
    description: Permanently delete a task by ID. Also removes associated comments
      and activity records.
  - method: GET
    path: /api/tasks/:taskId/activity
    description: Retrieve chronological activity log for a specific task including
      actor details.
  - method: GET
    path: /api/tasks/:taskId/comments
    description: Retrieve all comments for a specific task including author details,
      ordered by createdAt ascending.
  - method: POST
    path: /api/tasks/:taskId/comments
    description: "Add a new comment to a task. Request body: body (required).
      Creates an activity record."
  - method: PATCH
    path: /api/tasks/:taskId/comments/:commentId
    description: Edit an existing comment body. Only the comment author can edit.
  - method: DELETE
    path: /api/tasks/:taskId/comments/:commentId
    description: Delete a comment. Only the comment author or admin can delete.
  - method: GET
    path: /api/users
    description: List all users/team members with id, name, email, avatarUrl, and
      role. Used to populate assignee dropdowns.
  - method: GET
    path: /api/users/:userId
    description: Retrieve a single user profile by ID.
  - method: GET
    path: /api/team/workload
    description: "Returns workload data per team member: userId, name, avatarUrl,
      activeTaskCount, totalTaskCount, workloadPercentage."
  - method: GET
    path: /api/notifications
    description: Retrieve notifications for the currently authenticated user,
      ordered by createdAt descending. Includes isRead status and associated
      taskId.
  - method: PATCH
    path: /api/notifications/:notificationId
    description: "Mark a specific notification as read. Request body: isRead: true."
  - method: POST
    path: /api/notifications/mark-all-read
    description: Mark all notifications for the current user as read.
  - method: DELETE
    path: /api/notifications/:notificationId
    description: Dismiss (delete) a specific notification for the current user.
