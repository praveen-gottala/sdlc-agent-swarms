# M3.6 Design Info Value Eval — Task Fixtures
#
# Six tasks (3 NEW, 3 MODIFY) measuring how design-stage context affects
# implementer code-generation quality. Used by scripts/run-design-info-eval.ts.
#
# Entity data sourced from:
#   NEW tasks:    fixtures/personal-expense-tracker/agentforge/clarifier-output/enriched-requirement.json
#   MODIFY tasks: fixtures/personal-expense-tracker/agentforge/clarifier-brownfield-output/enriched-requirement.json
#
# Planning-stage data (screenPlan, componentComposition) sourced from:
#   NEW tasks:    fixtures/personal-expense-tracker/agentforge/architect-output/ (greenfield Architect run, 2026-05-16)
#   MODIFY tasks: fixtures/personal-expense-tracker/agentforge/architect-brownfield-output/ (brownfield Architect run, 2026-05-16)
#   Eval script loads the JSON files and selects by screenId at runtime.
#
# Design specs sourced from:
#   NEW tasks:    fixtures/personal-expense-tracker/agentforge/designs/*.json (M0 baseline)
#   MODIFY tasks: existingDesignSpecPath = pre-change spec from designs/*.json
#                 designSpecPath = same as existingDesignSpecPath (pre-change baseline)
#                 deltaPath = hand-crafted DesignSpecDelta JSON in deltas/*.delta.json
#                 Post-change spec is derived at eval time via deltaApply(existing, delta).
#                 The LLM-regenerated "post-change" specs in designs-brownfield-after/ were
#                 contaminated (full-screen regeneration, not delta) — archived as exhibit.

id: design-info-value
name: M3.6 Design Info Value Eval
description: >
  Empirical measurement across 5 context configurations × 6 tasks × 3 reps.
  Determines which DesignSliceStrategy value M4 should default to.

model: claude-sonnet-4-20250514
temperature: 0.3
reps: 3

tasks:
  # ---------------------------------------------------------------------------
  # NEW tasks (M0 CashPulse greenfield baseline)
  # ---------------------------------------------------------------------------

  - id: cashpulse-dashboard-summary-card
    taskDescription: >
      Build a React/TypeScript dashboard summary card component for CashPulse,
      a personal expense tracker. The card displays the current month's spending
      summary: total spent, budget remaining, daily average, and budget status
      indicator. Uses MonthSummary entity data and renders inside the dashboard
      layout's left column.
    taskType: NEW
    contractBundleSlice:
      dataModel:
        entities:
          - name: Expense
            fields:
              - { name: id, type: string }
              - { name: amount, type: number }
              - { name: description, type: string }
              - { name: categoryId, type: reference }
              - { name: date, type: date }
              - { name: paymentMethod, type: enum }
              - { name: note, type: string }
              - { name: createdAt, type: date }
          - name: MonthSummary
            fields:
              - { name: month, type: string }
              - { name: totalSpent, type: number }
              - { name: transactionCount, type: number }
              - { name: dailyAverage, type: number }
              - { name: budgetLimit, type: number }
              - { name: budgetStatus, type: enum }
              - { name: remainingAmount, type: number }
          - name: Budget
            fields:
              - { name: id, type: string }
              - { name: monthlyLimit, type: number }
              - { name: currency, type: enum }
              - { name: month, type: string }
    screenPlan:
      source: fixtures/personal-expense-tracker/agentforge/architect-output/screen-plans.json
      screenId: screen-001
    componentComposition:
      source: fixtures/personal-expense-tracker/agentforge/architect-output/component-compositions.json
      screenId: screen-001
    designSpecPath: fixtures/personal-expense-tracker/agentforge/designs/dashboard.json
    # REQUIRED: human-authored reference implementation — do not generate
    groundTruthExpected: >-
      A summary card component for the dashboard's left column showing the current
      month's spending overview. Header displays the month (from MonthSummary.month).
      Body shows four metrics laid out in a 2x2 grid or vertical stack: Total Spent
      (MonthSummary.totalSpent, formatted as currency with the project's locale),
      Budget Remaining (MonthSummary.remainingAmount, same formatting), Daily Average
      (MonthSummary.dailyAverage, same formatting), Transaction Count
      (MonthSummary.transactionCount, plain integer). A status indicator
      visually reflects MonthSummary.budgetStatus — color-coded (green for on-track,
      amber for at-risk, red for over-budget) or with an icon. Component uses
      MonthSummary directly, not aggregated from Expense rows. Props accept a
      MonthSummary object; renders within the dashboard's existing card styling
      (matching other dashboard cards' padding, border, radius).

  - id: cashpulse-transactions-list-page
    taskDescription: >
      Build a React/TypeScript spending insights page for CashPulse. The page
      displays a list of expenses grouped by category with spending totals,
      percentage breakdowns, and trend indicators. Includes filter chips for
      time range (week/month/quarter) and category. Uses CategorySpending and
      DailySpending entity data.
    taskType: NEW
    contractBundleSlice:
      dataModel:
        entities:
          - name: Expense
            fields:
              - { name: id, type: string }
              - { name: amount, type: number }
              - { name: description, type: string }
              - { name: categoryId, type: reference }
              - { name: date, type: date }
              - { name: paymentMethod, type: enum }
              - { name: note, type: string }
              - { name: createdAt, type: date }
          - name: Category
            fields:
              - { name: id, type: string }
              - { name: name, type: string }
              - { name: color, type: string }
              - { name: icon, type: string }
              - { name: isDefault, type: boolean }
          - name: CategorySpending
            fields:
              - { name: categoryId, type: reference }
              - { name: month, type: string }
              - { name: totalAmount, type: number }
              - { name: percentage, type: number }
              - { name: transactionCount, type: number }
          - name: DailySpending
            fields:
              - { name: date, type: date }
              - { name: totalAmount, type: number }
              - { name: transactionCount, type: number }
    screenPlan:
      source: fixtures/personal-expense-tracker/agentforge/architect-output/screen-plans.json
      screenId: screen-003
    componentComposition:
      source: fixtures/personal-expense-tracker/agentforge/architect-output/component-compositions.json
      screenId: screen-003
    designSpecPath: fixtures/personal-expense-tracker/agentforge/designs/spending-insights.json
    # REQUIRED: human-authored reference implementation — do not generate
    groundTruthExpected: >-
      A spending insights page with filter chips and a categorized expense breakdown.
      Top of page: filter chips for time range (Week / Month / Quarter, single-select)
      and a category filter (multi-select dropdown of Category names with their icons
      and colors). Main content: list of category rows, each showing category name
      with its Category.icon and Category.color as a leading visual, total spent
      (CategorySpending.totalAmount as currency), percentage of total
      (CategorySpending.percentage as "%"), transaction count
      (CategorySpending.transactionCount as "N transactions"), and a small trend
      indicator (arrow up/down or sparkline). Rows sorted by totalAmount descending.
      Optionally renders a daily spending sparkline above the list using
      DailySpending entries within the selected time range. All data binds to
      CategorySpending and DailySpending — do NOT aggregate from raw Expense rows.
      Empty state shows "No expenses in this time range" centered on the page.

  - id: cashpulse-settings-form
    taskDescription: >
      Build a React/TypeScript settings form component for CashPulse. The form
      allows users to configure their default currency, monthly budget limit,
      and manage expense categories (add, edit, delete, set colors and icons).
      Uses UserSettings, Budget, and Category entity data.
    taskType: NEW
    contractBundleSlice:
      dataModel:
        entities:
          - name: UserSettings
            fields:
              - { name: id, type: string }
              - { name: currency, type: enum }
              - { name: defaultMonthlyBudget, type: number }
          - name: Budget
            fields:
              - { name: id, type: string }
              - { name: monthlyLimit, type: number }
              - { name: currency, type: enum }
              - { name: month, type: string }
          - name: Category
            fields:
              - { name: id, type: string }
              - { name: name, type: string }
              - { name: color, type: string }
              - { name: icon, type: string }
              - { name: isDefault, type: boolean }
    screenPlan:
      source: fixtures/personal-expense-tracker/agentforge/architect-output/screen-plans.json
      screenId: screen-004
    componentComposition:
      source: fixtures/personal-expense-tracker/agentforge/architect-output/component-compositions.json
      screenId: screen-004
    designSpecPath: fixtures/personal-expense-tracker/agentforge/designs/settings.json
    # REQUIRED: human-authored reference implementation — do not generate
    groundTruthExpected: >-
      A settings form with three sections. Section 1 — Preferences: currency selector
      (dropdown bound to UserSettings.currency, options from the currency enum),
      default monthly budget input (number input bound to
      UserSettings.defaultMonthlyBudget, formatted as currency on display).
      Section 2 — Current Month Budget: shows the active Budget.monthlyLimit and
      Budget.currency in a read-only summary card with an "Edit" link.
      Section 3 — Manage Categories: list of Category rows each showing Category.name,
      a color swatch (Category.color), the category icon (Category.icon), and per-row
      actions (Edit, Delete). Categories where Category.isDefault is true do NOT
      expose a Delete action — only Edit. Below the list, an "Add Category" button
      opens an inline form with name, color picker, and icon picker. Form uses
      controlled inputs, validates non-empty name on save, and calls back to a
      provided onUpdate handler. No persistence in the component itself.

  # ---------------------------------------------------------------------------
  # MODIFY tasks (M3.5 CashPulse brownfield — "Add recurring transactions")
  # ---------------------------------------------------------------------------

  - id: cashpulse-dashboard-modify-add-recurring-card
    taskDescription: >
      Modify the existing CashPulse dashboard component to add an "Upcoming
      Recurring Expenses" card in the left column. The card shows the next 3-5
      upcoming recurring transactions with amount, merchant name, frequency
      badge, and next occurrence date. Each row links to the expense detail.
      The existing dashboard has 159 nodes including a spending summary and
      recent expense list.
    taskType: MODIFY
    contractBundleSlice:
      dataModel:
        entities:
          - name: Expense
            fields:
              - { name: id, type: string }
              - { name: amount, type: number }
              - { name: categoryId, type: reference }
              - { name: merchantName, type: string }
              - { name: date, type: date }
              - { name: paymentMethod, type: enum }
              - { name: note, type: string }
              - { name: recurringTemplateId, type: reference }
          - name: RecurringTemplate
            fields:
              - { name: id, type: string }
              - { name: amount, type: number }
              - { name: categoryId, type: reference }
              - { name: merchantName, type: string }
              - { name: frequency, type: enum }
              - { name: startDate, type: date }
              - { name: endDate, type: date }
              - { name: nextOccurrence, type: date }
              - { name: paymentMethod, type: enum }
              - { name: note, type: string }
              - { name: status, type: enum }
              - { name: createdAt, type: date }
    screenPlan:
      source: fixtures/personal-expense-tracker/agentforge/architect-brownfield-output/screen-plans.json
      screenId: screen-001
    componentComposition:
      source: fixtures/personal-expense-tracker/agentforge/architect-brownfield-output/component-compositions.json
      screenId: screen-001
    designSpecPath: fixtures/personal-expense-tracker/agentforge/designs/dashboard.json
    existingDesignSpecPath: fixtures/personal-expense-tracker/agentforge/designs/dashboard.json
    deltaPath: fixtures/personal-expense-tracker/agentforge/deltas/dashboard-add-recurring-card.delta.json
    # REQUIRED: human-authored reference implementation — do not generate
    groundTruthExpected: >-
      The existing dashboard layout is preserved unchanged. A new "Upcoming Recurring"
      card is inserted in the dashboard's left column, between the Monthly Budget
      card and the Spending by Category card. Card header: title "Upcoming Recurring"
      and an optional refresh icon. Card body: list of 3-5 RecurringTemplate rows
      where RecurringTemplate.status is "active", sorted by
      RecurringTemplate.nextOccurrence ascending. Each row shows
      RecurringTemplate.merchantName (left), RecurringTemplate.amount (right, formatted
      as currency), a small frequency badge derived from RecurringTemplate.frequency
      (values "Weekly" | "Monthly" | "Yearly"), and the next occurrence date below or
      beside the merchant name (RecurringTemplate.nextOccurrence formatted as
      "MMM D, YYYY"). Card footer: "View all recurring expenses" link to a future
      recurring management page. The component binds to RecurringTemplate entities,
      NOT to Expense rows. Existing dashboard nodes (Monthly Budget, Spending by
      Category, Recent Expenses) must render unchanged from their pre-change
      implementation. Component is purely additive; it does not modify any existing
      dashboard component.

  - id: cashpulse-add-expense-modify-recurrence-toggle
    taskDescription: >
      Modify the existing CashPulse add-expense form to include a recurrence
      configuration section. Add a toggle "Make this recurring" that, when
      enabled, reveals a frequency picker (weekly/monthly/yearly), start date,
      and optional end date fields. The recurrence data maps to the
      RecurringTemplate entity. The existing form has 157 nodes including
      amount, category, date, payment method, and note fields.
    taskType: MODIFY
    contractBundleSlice:
      dataModel:
        entities:
          - name: Expense
            fields:
              - { name: id, type: string }
              - { name: amount, type: number }
              - { name: categoryId, type: reference }
              - { name: merchantName, type: string }
              - { name: date, type: date }
              - { name: paymentMethod, type: enum }
              - { name: note, type: string }
              - { name: recurringTemplateId, type: reference }
          - name: RecurringTemplate
            fields:
              - { name: id, type: string }
              - { name: amount, type: number }
              - { name: categoryId, type: reference }
              - { name: merchantName, type: string }
              - { name: frequency, type: enum }
              - { name: startDate, type: date }
              - { name: endDate, type: date }
              - { name: nextOccurrence, type: date }
              - { name: paymentMethod, type: enum }
              - { name: note, type: string }
              - { name: status, type: enum }
              - { name: createdAt, type: date }
    screenPlan:
      source: fixtures/personal-expense-tracker/agentforge/architect-brownfield-output/screen-plans.json
      screenId: screen-002
    componentComposition:
      source: fixtures/personal-expense-tracker/agentforge/architect-brownfield-output/component-compositions.json
      screenId: screen-002
    designSpecPath: fixtures/personal-expense-tracker/agentforge/designs/add-expense.json
    existingDesignSpecPath: fixtures/personal-expense-tracker/agentforge/designs/add-expense.json
    deltaPath: fixtures/personal-expense-tracker/agentforge/deltas/add-expense-recurrence-toggle.delta.json
    # REQUIRED: human-authored reference implementation — do not generate
    groundTruthExpected: >-
      The existing add-expense form fields (amount, category, description, date,
      payment method, note) render unchanged. After the note field and before the
      Save button, a new "Recurring" section is added: a toggle labeled "Make this
      recurring" (or "Recurring") bound to local component state. When the toggle is
      OFF: only the toggle is visible. When the toggle is ON: reveals (a) a frequency
      picker — three buttons or a select with options Weekly / Monthly / Yearly
      mapping to RecurringTemplate.frequency, (b) a start date input defaulting to
      the Expense.date already entered, mapping to RecurringTemplate.startDate,
      (c) an end date selector with two options "Never" (RecurringTemplate.endDate =
      null) and "On date" (date picker, maps to RecurringTemplate.endDate). On form
      submit: if toggle OFF, submit only the Expense entity with
      recurringTemplateId=null. If toggle ON, submit a RecurringTemplate first
      (with status="active"), then submit the Expense with recurringTemplateId set
      to the new template's id. Validation: when toggle is ON, frequency is required;
      when "On date" is selected, end date is required and must be after start date.
      Existing form validation rules for amount, category, etc. remain unchanged.

  - id: cashpulse-transactions-list-modify-recurring-badge
    taskDescription: >
      Modify the existing CashPulse dashboard's expense list to add a recurring
      badge to each transaction row that has a recurringTemplateId. The badge
      shows the frequency (weekly/monthly/yearly) as a small pill/chip next to
      the amount. Non-recurring expenses show no badge. The existing dashboard
      expense list rows display amount, description, category, and date.
    taskType: MODIFY
    contractBundleSlice:
      dataModel:
        entities:
          - name: Expense
            fields:
              - { name: id, type: string }
              - { name: amount, type: number }
              - { name: categoryId, type: reference }
              - { name: merchantName, type: string }
              - { name: date, type: date }
              - { name: paymentMethod, type: enum }
              - { name: note, type: string }
              - { name: recurringTemplateId, type: reference }
          - name: RecurringTemplate
            fields:
              - { name: id, type: string }
              - { name: amount, type: number }
              - { name: categoryId, type: reference }
              - { name: merchantName, type: string }
              - { name: frequency, type: enum }
              - { name: startDate, type: date }
              - { name: endDate, type: date }
              - { name: nextOccurrence, type: date }
              - { name: paymentMethod, type: enum }
              - { name: note, type: string }
              - { name: status, type: enum }
              - { name: createdAt, type: date }
    screenPlan:
      source: fixtures/personal-expense-tracker/agentforge/architect-brownfield-output/screen-plans.json
      screenId: screen-006
    componentComposition:
      source: fixtures/personal-expense-tracker/agentforge/architect-brownfield-output/component-compositions.json
      screenId: screen-006
    designSpecPath: fixtures/personal-expense-tracker/agentforge/designs/dashboard.json
    existingDesignSpecPath: fixtures/personal-expense-tracker/agentforge/designs/dashboard.json
    deltaPath: fixtures/personal-expense-tracker/agentforge/deltas/transactions-list-recurring-badge.delta.json
    # REQUIRED: human-authored reference implementation — do not generate
    groundTruthExpected: >-
      The existing dashboard's expense list rows render unchanged in structure
      (amount, description/merchant, category badge, date, payment method). For each
      expense row, if Expense.recurringTemplateId is non-null, render a small
      frequency badge as a child of the row near the amount. The badge text is the
      RecurringTemplate.frequency value (requires resolving the recurringTemplateId
      reference — assume joined data is available or fetched). Badge styling: small
      pill shape, muted background color (not the primary accent), font size 11-12px,
      labeled by frequency. For expenses where recurringTemplateId is null, no badge
      renders — the row layout matches the pre-change implementation exactly. The
      badge is purely additive; no existing row content is modified or shifted in
      visual hierarchy. Components remain bound to Expense data; the frequency value
      comes from the joined RecurringTemplate.
