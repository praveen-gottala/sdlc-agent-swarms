<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Chip body -->
  <rect x="16" y="16" width="32" height="32" rx="4" fill="#1a1b2e" stroke="url(#grad)" stroke-width="2"/>

  <!-- Circuit traces - top -->
  <line x1="24" y1="16" x2="24" y2="8" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="16" x2="32" y2="8" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
  <line x1="40" y1="16" x2="40" y2="8" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>

  <!-- Circuit traces - bottom -->
  <line x1="24" y1="48" x2="24" y2="56" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="48" x2="32" y2="56" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
  <line x1="40" y1="48" x2="40" y2="56" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>

  <!-- Circuit traces - left -->
  <line x1="16" y1="24" x2="8" y2="24" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="32" x2="8" y2="32" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="40" x2="8" y2="40" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round"/>

  <!-- Circuit traces - right -->
  <line x1="48" y1="24" x2="56" y2="24" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round"/>
  <line x1="48" y1="32" x2="56" y2="32" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round"/>
  <line x1="48" y1="40" x2="56" y2="40" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round"/>

  <!-- Pin dots -->
  <circle cx="24" cy="8" r="2" fill="#3b82f6"/>
  <circle cx="32" cy="8" r="2" fill="#3b82f6"/>
  <circle cx="40" cy="8" r="2" fill="#3b82f6"/>
  <circle cx="24" cy="56" r="2" fill="#3b82f6"/>
  <circle cx="32" cy="56" r="2" fill="#3b82f6"/>
  <circle cx="40" cy="56" r="2" fill="#3b82f6"/>
  <circle cx="8" cy="24" r="2" fill="#8b5cf6"/>
  <circle cx="8" cy="32" r="2" fill="#8b5cf6"/>
  <circle cx="8" cy="40" r="2" fill="#8b5cf6"/>
  <circle cx="56" cy="24" r="2" fill="#8b5cf6"/>
  <circle cx="56" cy="32" r="2" fill="#8b5cf6"/>
  <circle cx="56" cy="40" r="2" fill="#8b5cf6"/>

  <!-- Inner die - neural pattern -->
  <rect x="22" y="22" width="20" height="20" rx="2" fill="#252736"/>
  <circle cx="28" cy="28" r="2" fill="#3b82f6" opacity="0.8"/>
  <circle cx="36" cy="28" r="2" fill="#8b5cf6" opacity="0.8"/>
  <circle cx="28" cy="36" r="2" fill="#8b5cf6" opacity="0.8"/>
  <circle cx="36" cy="36" r="2" fill="#3b82f6" opacity="0.8"/>
  <line x1="28" y1="28" x2="36" y2="28" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>
  <line x1="28" y1="28" x2="28" y2="36" stroke="#8b5cf6" stroke-width="1" opacity="0.4"/>
  <line x1="36" y1="28" x2="36" y2="36" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>
  <line x1="28" y1="36" x2="36" y2="36" stroke="#8b5cf6" stroke-width="1" opacity="0.4"/>
  <line x1="28" y1="28" x2="36" y2="36" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
  <line x1="36" y1="28" x2="28" y2="36" stroke="#6366f1" stroke-width="1" opacity="0.3"/>

  <!-- Center glow -->
  <circle cx="32" cy="32" r="3" fill="url(#glow)"/>

  <defs>
    <linearGradient id="grad" x1="16" y1="16" x2="48" y2="48">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
