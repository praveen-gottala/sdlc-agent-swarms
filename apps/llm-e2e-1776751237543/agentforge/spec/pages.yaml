version: "1.0"
pages:
  - id: dashboard
    name: Dashboard
    route: /
    description: Main dashboard showing active tasks summary, team workload
      overview, and key metrics. Includes a top navigation bar with a bell icon
      to open the notifications drawer.
    status: draft
    designStatus: draft
    components:
      - id: top-nav
        type: NavigationBar
        description: Top navigation bar with TaskPilot logo, nav links (Dashboard,
          Tasks), and a bell icon button for notifications
        props:
          logoText: TaskPilot
          links:
            - Dashboard
            - Tasks
          showNotificationBell: true
      - id: dashboard-heading
        type: Heading
        description: Page title 'Dashboard' in heading-1 typography
        props:
          level: 1
          text: Dashboard
      - id: active-tasks-summary-card
        type: StatCard
        description: Card showing count of active tasks with a teal accent
        props:
          label: Active Tasks
          valueSource: activeTasks.count
      - id: completed-tasks-summary-card
        type: StatCard
        description: Card showing count of completed tasks today
        props:
          label: Completed Today
          valueSource: completedToday.count
      - id: overdue-tasks-summary-card
        type: StatCard
        description: Card showing count of overdue tasks with coral accent for urgency
        props:
          label: Overdue
          valueSource: overdueTasks.count
          accentColor: coral-accent
      - id: team-workload-section
        type: Section
        description: Section header for team workload
        props:
          title: Team Workload
      - id: team-workload-list
        type: WorkloadList
        description: List of team members with their assigned task counts and a
          horizontal progress bar indicating workload percentage
        props:
          dataSource: teamWorkload
      - id: recent-active-tasks-section
        type: Section
        description: Section header for recent active tasks
        props:
          title: Recent Active Tasks
      - id: recent-tasks-list
        type: TaskCardList
        description: Scrollable list of the most recent active task cards showing title,
          assignee avatar, priority badge, and due date. Clicking a task
          navigates to task detail.
        props:
          dataSource: recentActiveTasks
          limit: 5
          clickable: true
      - id: create-task-fab
        type: FloatingActionButton
        description: Floating button labeled '+ New Task' to navigate to the create task
          form
        props:
          label: + New Task
          color: cta-primary
    dataSources:
      - id: activeTasks
        endpoint: GET /api/tasks
        params:
          status: active
      - id: completedToday
        endpoint: GET /api/tasks
        params:
          status: completed
          completedToday: true
      - id: overdueTasks
        endpoint: GET /api/tasks
        params:
          status: overdue
      - id: teamWorkload
        endpoint: GET /api/team/workload
      - id: recentActiveTasks
        endpoint: GET /api/tasks
        params:
          status: active
          limit: 5
          sort: updatedAt_desc
    screen_type: page
    navigates_to:
      - target: task-list
        trigger: Click 'Tasks' in navigation bar
        mode: overlay
      - target: task-detail
        trigger: Click a task card in Recent Active Tasks
      - target: task-create
        trigger: Click '+ New Task' floating action button
      - target: notifications-drawer
        trigger: Click bell icon in navigation bar
  - id: task-list
    name: Task List
    route: /tasks
    description: Full list of tasks with filter controls for status, assignee,
      priority, and due date. Each row has a delete icon that triggers the
      delete confirmation modal.
    status: draft
    designStatus: draft
    components:
      - id: top-nav
        type: NavigationBar
        description: Top navigation bar with TaskPilot logo, nav links (Dashboard,
          Tasks), and a bell icon button for notifications
        props:
          logoText: TaskPilot
          links:
            - Dashboard
            - Tasks
          showNotificationBell: true
          activeLink: Tasks
      - id: task-list-heading
        type: Heading
        description: Page title 'Tasks' in heading-1 typography
        props:
          level: 1
          text: Tasks
      - id: filter-bar
        type: FilterBar
        description: "Horizontal bar with filter dropdowns: Status (All, Active,
          Completed, Overdue), Priority (All, High, Medium, Low), Assignee (team
          members), and a date range picker for due date"
        props:
          filters:
            - status
            - priority
            - assignee
            - dueDate
      - id: search-input
        type: SearchInput
        description: Text input to search tasks by title or description
        props:
          placeholder: Search tasks…
      - id: create-task-button
        type: Button
        description: Primary button labeled '+ New Task' to navigate to the create task form
        props:
          label: + New Task
          variant: primary
      - id: task-table
        type: DataTable
        description: "Table of tasks with columns: Title, Assignee, Priority badge,
          Status badge, Due Date, and Actions (edit icon, delete icon). Clicking
          a row title navigates to task detail. Clicking delete icon opens the
          delete confirmation modal."
        props:
          dataSource: tasks
          columns:
            - title
            - assignee
            - priority
            - status
            - dueDate
            - actions
          rowClickable: true
      - id: pagination
        type: Pagination
        description: Pagination controls for navigating task list pages
        props:
          pageSize: 20
    dataSources:
      - id: tasks
        endpoint: GET /api/tasks
        params:
          page: 1
          limit: 20
      - id: teamMembers
        endpoint: GET /api/users
    screen_type: page
    navigates_to:
      - target: dashboard
        trigger: Click 'Dashboard' in navigation bar
      - target: task-detail
        trigger: Click task title in table row
      - target: task-create
        trigger: Click '+ New Task' button
      - target: task-edit
        trigger: Click edit icon in task row actions
      - target: delete-confirmation-modal
        trigger: Click delete icon in task row actions
      - target: notifications-drawer
        trigger: Click bell icon in navigation bar
  - id: task-detail
    name: Task Detail
    route: /tasks/:taskId
    description: Detailed view of a single task showing all fields, activity log,
      comments, and action buttons to edit or delete the task.
    status: draft
    designStatus: draft
    components:
      - id: top-nav
        type: NavigationBar
        description: Top navigation bar with TaskPilot logo, nav links (Dashboard,
          Tasks), and a bell icon button for notifications
        props:
          logoText: TaskPilot
          links:
            - Dashboard
            - Tasks
          showNotificationBell: true
      - id: breadcrumb
        type: Breadcrumb
        description: "Breadcrumb trail: Dashboard > Tasks > [Task Title]"
        props:
          items:
            - Dashboard
            - Tasks
            - taskTitle
      - id: task-title
        type: Heading
        description: Task title displayed as heading-1
        props:
          level: 1
          dataSource: task.title
      - id: task-meta-bar
        type: MetaBar
        description: "Row of metadata chips: Status badge, Priority badge, Assignee
          avatar + name, Due Date"
        props:
          fields:
            - status
            - priority
            - assignee
            - dueDate
      - id: task-description
        type: RichTextDisplay
        description: Full task description rendered as formatted text
        props:
          dataSource: task.description
      - id: task-tags
        type: TagList
        description: List of tags/labels associated with the task
        props:
          dataSource: task.tags
      - id: task-actions-bar
        type: ActionBar
        description: "Action buttons: 'Edit Task' (primary) and 'Delete Task'
          (destructive/outlined with coral color)"
        props:
          actions:
            - Edit Task
            - Delete Task
      - id: activity-log
        type: ActivityLog
        description: Chronological list of activity entries showing who changed what and
          when
        props:
          dataSource: taskActivity
      - id: comments-section
        type: CommentsSection
        description: Comment thread with existing comments (avatar, author name,
          timestamp, text) and an input area to add a new comment
        props:
          dataSource: taskComments
          allowAdd: true
    dataSources:
      - id: task
        endpoint: GET /api/tasks/:taskId
      - id: taskActivity
        endpoint: GET /api/tasks/:taskId/activity
      - id: taskComments
        endpoint: GET /api/tasks/:taskId/comments
    screen_type: page
    navigates_to:
      - target: dashboard
        trigger: Click 'Dashboard' in navigation bar or breadcrumb
      - target: task-list
        trigger: Click 'Tasks' in navigation bar or breadcrumb
      - target: task-edit
        trigger: Click 'Edit Task' button
      - target: delete-confirmation-modal
        trigger: Click 'Delete Task' button
      - target: notifications-drawer
        trigger: Click bell icon in navigation bar
  - id: task-create
    name: Create Task
    route: /tasks/new
    description: Form page to create a new task with all required and optional fields.
    status: draft
    designStatus: draft
    components:
      - id: top-nav
        type: NavigationBar
        description: Top navigation bar with TaskPilot logo, nav links (Dashboard,
          Tasks), and a bell icon button for notifications
        props:
          logoText: TaskPilot
          links:
            - Dashboard
            - Tasks
          showNotificationBell: true
      - id: breadcrumb
        type: Breadcrumb
        description: "Breadcrumb trail: Dashboard > Tasks > New Task"
        props:
          items:
            - Dashboard
            - Tasks
            - New Task
      - id: create-task-heading
        type: Heading
        description: Page title 'Create Task' in heading-1 typography
        props:
          level: 1
          text: Create Task
      - id: task-form
        type: Form
        description: "Task creation form with fields: Title (text input, required),
          Description (rich text area), Assignee (user select dropdown),
          Priority (select: High/Medium/Low), Status (select: Active/Completed),
          Due Date (date picker), Tags (multi-tag input). Submit button labeled
          'Create Task' and Cancel button."
        props:
          fields:
            - title
            - description
            - assignee
            - priority
            - status
            - dueDate
            - tags
          submitLabel: Create Task
          showCancel: true
    dataSources:
      - id: teamMembers
        endpoint: GET /api/users
    screen_type: page
    navigates_to:
      - target: task-list
        trigger: Click 'Cancel' button
      - target: task-detail
        trigger: Submit form successfully (redirected to new task detail)
      - target: dashboard
        trigger: Click 'Dashboard' in navigation bar or breadcrumb
      - target: task-list
        trigger: Click 'Tasks' in navigation bar or breadcrumb
      - target: notifications-drawer
        trigger: Click bell icon in navigation bar
  - id: task-edit
    name: Edit Task
    route: /tasks/:taskId/edit
    description: Form page to edit an existing task, pre-populated with current task data.
    status: draft
    designStatus: draft
    components:
      - id: top-nav
        type: NavigationBar
        description: Top navigation bar with TaskPilot logo, nav links (Dashboard,
          Tasks), and a bell icon button for notifications
        props:
          logoText: TaskPilot
          links:
            - Dashboard
            - Tasks
          showNotificationBell: true
      - id: breadcrumb
        type: Breadcrumb
        description: "Breadcrumb trail: Dashboard > Tasks > [Task Title] > Edit"
        props:
          items:
            - Dashboard
            - Tasks
            - taskTitle
            - Edit
      - id: edit-task-heading
        type: Heading
        description: Page title 'Edit Task' in heading-1 typography
        props:
          level: 1
          text: Edit Task
      - id: task-edit-form
        type: Form
        description: "Pre-populated task edit form with the same fields as create:
          Title, Description, Assignee, Priority, Status, Due Date, Tags. Submit
          button labeled 'Save Changes' and Cancel button."
        props:
          fields:
            - title
            - description
            - assignee
            - priority
            - status
            - dueDate
            - tags
          submitLabel: Save Changes
          showCancel: true
          dataSource: task
    dataSources:
      - id: task
        endpoint: GET /api/tasks/:taskId
      - id: teamMembers
        endpoint: GET /api/users
    screen_type: page
    navigates_to:
      - target: task-detail
        trigger: Click 'Cancel' button
      - target: task-detail
        trigger: Submit form successfully (redirected to updated task detail)
      - target: dashboard
        trigger: Click 'Dashboard' in navigation bar or breadcrumb
      - target: task-list
        trigger: Click 'Tasks' in navigation bar or breadcrumb
      - target: notifications-drawer
        trigger: Click bell icon in navigation bar
  - id: notifications-drawer
    name: Notifications Drawer
    route: /notifications-drawer
    description: A right-side sliding drawer panel that displays the user's
      notifications. Opens when the bell icon is clicked in the top navigation
      bar. Each notification can be marked as read or dismissed. Clicking a
      notification related to a task navigates to that task.
    status: draft
    designStatus: draft
    components:
      - id: drawer-header
        type: DrawerHeader
        description: Header with title 'Notifications', a 'Mark all as read' text
          button, and a close (X) icon button
        props:
          title: Notifications
          showMarkAllRead: true
          showClose: true
      - id: notifications-list
        type: NotificationList
        description: Scrollable list of notification items. Each item shows an icon,
          message text, relative timestamp, and an unread indicator dot. Unread
          items have a subtle teal-tinted background.
        props:
          dataSource: notifications
          itemActions:
            - markRead
            - dismiss
      - id: empty-state
        type: EmptyState
        description: Shown when there are no notifications. Displays a minimal
          illustration and 'You're all caught up!' message.
        props:
          message: You're all caught up!
          showIllustration: true
    dataSources:
      - id: notifications
        endpoint: GET /api/notifications
    screen_type: drawer
    navigates_to:
      - target: task-detail
        trigger: Click a task-related notification item
  - id: delete-confirmation-modal
    name: Delete Confirmation
    route: /delete-confirmation
    description: "A centered modal overlay that asks the user to confirm deletion of
      a task. Contains the task title for context, a warning message, and two
      action buttons: 'Delete' (destructive) and 'Cancel'."
    status: draft
    designStatus: draft
    components:
      - id: modal-overlay
        type: Overlay
        description: Semi-transparent dark overlay behind the modal dialog
        props:
          color: rgba(0,0,0,0.5)
      - id: modal-dialog
        type: DialogCard
        description: Centered white card with elevation level 3 shadow, rounded corners
          (large radius)
        props:
          elevation: 3
          borderRadius: large
      - id: modal-heading
        type: Heading
        description: Modal title 'Delete Task?' in heading-2 typography with warm-gray color
        props:
          level: 2
          text: Delete Task?
      - id: modal-body-text
        type: Text
        description: "Warning message: 'Are you sure you want to delete \"[Task
          Title]\"? This action cannot be undone.' with the task title shown in
          bold."
        props:
          role: body
          showTaskName: true
      - id: modal-cancel-button
        type: Button
        description: Secondary/outlined 'Cancel' button that dismisses the modal without
          deleting
        props:
          label: Cancel
          variant: outlined
      - id: modal-delete-button
        type: Button
        description: Destructive 'Delete' button with coral-accent background that
          triggers task deletion and closes the modal
        props:
          label: Delete
          variant: destructive
          color: coral-accent
    dataSources: []
    screen_type: modal
    navigates_to:
      - target: task-list
        trigger: Click 'Delete' button (task deleted, redirect to task list)
