version: "1.0"
pages:
  - id: dashboard
    name: Dashboard
    route: /
    description: Main dashboard showing task summary statistics, recent tasks, and
      quick actions. Provides an overview of task completion status, upcoming
      deadlines, and priority breakdown.
    status: draft
    designStatus: draft
    components:
      - id: top-nav
        type: NavigationBar
        description: Top navigation bar with app logo, page title, and notification bell
          icon button
        props:
          title: E2E Test Dashboard
          showNotificationBell: true
      - id: stats-summary
        type: StatsGrid
        description: "Grid of 4 stat cards showing: Total Tasks, Completed, In Progress,
          and Overdue counts"
        props:
          cards:
            - totalTasks
            - completed
            - inProgress
            - overdue
      - id: recent-tasks-list
        type: TaskList
        description: A scrollable list of the 5 most recently updated tasks with title,
          status badge, and priority indicator
        props:
          limit: 5
          showViewAll: true
      - id: quick-add-task-btn
        type: Button
        description: Prominent CTA button to create a new task
        props:
          label: Add New Task
          variant: primary
          icon: plus
    dataSources:
      - id: task-stats
        endpoint: GET /api/tasks/stats
        description: Fetch aggregate task statistics for the summary cards
      - id: recent-tasks
        endpoint: GET /api/tasks?limit=5&sort=updatedAt
        description: Fetch 5 most recently updated tasks
    screen_type: page
    navigates_to:
      - target: task-list
        trigger: Click View All tasks link
      - target: task-create
        trigger: Click Add New Task button
      - target: notifications-drawer
        trigger: Click notification bell icon
      - target: task-detail
        trigger: Click a task row in recent tasks list
  - id: task-list
    name: Task List
    route: /tasks
    description: Full paginated list of all tasks with filtering by status and
      priority, sorting options, and search. Each task row shows title, status,
      priority, due date, and assignee.
    status: draft
    designStatus: draft
    components:
      - id: top-nav
        type: NavigationBar
        description: Top navigation bar with app logo, page title, and notification bell
          icon button
        props:
          title: Tasks
          showNotificationBell: true
          showBackButton: false
      - id: search-bar
        type: SearchInput
        description: Full-width search input to filter tasks by title or description
        props:
          placeholder: Search tasks...
      - id: filter-bar
        type: FilterBar
        description: Horizontal row of filter chips for Status (All, Todo, In Progress,
          Done) and Priority (All, High, Medium, Low)
        props:
          filters:
            - status
            - priority
      - id: sort-dropdown
        type: Dropdown
        description: Dropdown to sort tasks by due date, created date, priority, or title
        props:
          options:
            - Due Date
            - Created Date
            - Priority
            - Title
      - id: task-table
        type: DataTable
        description: "Paginated table of tasks with columns: title, status badge,
          priority badge, due date, assignee avatar, and action menu"
        props:
          columns:
            - title
            - status
            - priority
            - dueDate
            - assignee
            - actions
          pageSize: 20
      - id: add-task-fab
        type: FloatingActionButton
        description: Floating action button to create a new task
        props:
          label: Add Task
          icon: plus
    dataSources:
      - id: tasks
        endpoint: GET /api/tasks
        description: Fetch paginated tasks with optional filters for status, priority,
          and search query
    screen_type: page
    navigates_to:
      - target: task-detail
        trigger: Click a task row
      - target: task-create
        trigger: Click Add Task floating action button
      - target: notifications-drawer
        trigger: Click notification bell icon
      - target: delete-confirmation-modal
        trigger: Click Delete in task action menu
      - target: dashboard
        trigger: Click Dashboard in navigation
  - id: task-detail
    name: Task Detail
    route: /tasks/:id
    description: "Full detail view of a single task showing all fields: title,
      description, status, priority, due date, assignee, created date, and
      activity/comment history. Includes edit and delete actions."
    status: draft
    designStatus: draft
    components:
      - id: top-nav
        type: NavigationBar
        description: Navigation bar with back button, task title, notification bell, and
          overflow action menu (Edit, Delete)
        props:
          showBackButton: true
          showNotificationBell: true
          showActionMenu: true
          actionMenuItems:
            - Edit
            - Delete
      - id: task-header
        type: TaskHeader
        description: Large task title, status badge, and priority badge displayed
          prominently at the top
        props:
          showStatusBadge: true
          showPriorityBadge: true
      - id: task-meta
        type: MetaGrid
        description: Grid layout showing due date, assignee, created by, and created at
          metadata fields
        props:
          fields:
            - dueDate
            - assignee
            - createdBy
            - createdAt
            - updatedAt
      - id: task-description
        type: RichTextDisplay
        description: Section displaying the full task description text
        props:
          label: Description
      - id: activity-feed
        type: ActivityList
        description: Chronological list of comments and status change events for the task
        props:
          showCommentInput: true
      - id: edit-task-btn
        type: Button
        description: Primary button to navigate to edit form for this task
        props:
          label: Edit Task
          variant: primary
      - id: delete-task-btn
        type: Button
        description: Danger/secondary button to trigger the delete confirmation dialog
        props:
          label: Delete Task
          variant: danger
    dataSources:
      - id: task
        endpoint: GET /api/tasks/:id
        description: Fetch full task details by ID
      - id: task-comments
        endpoint: GET /api/tasks/:id/comments
        description: Fetch all comments and activity for the task
    screen_type: page
    navigates_to:
      - target: task-edit
        trigger: Click Edit Task button
      - target: delete-confirmation-modal
        trigger: Click Delete Task button
      - target: task-list
        trigger: Click back button in navigation
      - target: notifications-drawer
        trigger: Click notification bell icon
  - id: task-create
    name: Create Task
    route: /tasks/new
    description: Form page for creating a new task. Fields include title,
      description, status, priority, due date, and assignee. Includes validation
      and cancel/submit actions.
    status: draft
    designStatus: draft
    components:
      - id: top-nav
        type: NavigationBar
        description: Navigation bar with back/cancel button and page title 'New Task'
        props:
          title: New Task
          showBackButton: true
      - id: task-form
        type: Form
        description: Task creation form with all required and optional fields
        props:
          fields:
            - name: title
              type: text
              label: Title
              required: true
            - name: description
              type: textarea
              label: Description
            - name: status
              type: select
              label: Status
              options:
                - todo
                - in_progress
                - done
              required: true
            - name: priority
              type: select
              label: Priority
              options:
                - low
                - medium
                - high
              required: true
            - name: dueDate
              type: datepicker
              label: Due Date
            - name: assigneeId
              type: userSelect
              label: Assignee
      - id: form-actions
        type: ButtonGroup
        description: Cancel and Submit buttons at the bottom of the form
        props:
          buttons:
            - label: Cancel
              variant: secondary
            - label: Create Task
              variant: primary
              type: submit
    dataSources:
      - id: create-task
        endpoint: POST /api/tasks
        description: Submit new task data
      - id: users-list
        endpoint: GET /api/users
        description: Fetch users for assignee selector
    screen_type: page
    navigates_to:
      - target: task-list
        trigger: Click Cancel button
      - target: task-detail
        trigger: Click Create Task button and form submits successfully
  - id: task-edit
    name: Edit Task
    route: /tasks/:id/edit
    description: Form page for editing an existing task. Pre-populated with current
      task data. Fields mirror the create form. Includes cancel, save, and
      delete actions.
    status: draft
    designStatus: draft
    components:
      - id: top-nav
        type: NavigationBar
        description: Navigation bar with back/cancel button and page title 'Edit Task'
        props:
          title: Edit Task
          showBackButton: true
      - id: task-edit-form
        type: Form
        description: Pre-populated task edit form
        props:
          fields:
            - name: title
              type: text
              label: Title
              required: true
            - name: description
              type: textarea
              label: Description
            - name: status
              type: select
              label: Status
              options:
                - todo
                - in_progress
                - done
              required: true
            - name: priority
              type: select
              label: Priority
              options:
                - low
                - medium
                - high
              required: true
            - name: dueDate
              type: datepicker
              label: Due Date
            - name: assigneeId
              type: userSelect
              label: Assignee
      - id: form-actions
        type: ButtonGroup
        description: Cancel, Delete, and Save Changes buttons
        props:
          buttons:
            - label: Cancel
              variant: secondary
            - label: Delete Task
              variant: danger
            - label: Save Changes
              variant: primary
              type: submit
    dataSources:
      - id: task
        endpoint: GET /api/tasks/:id
        description: Fetch existing task data to pre-populate the form
      - id: update-task
        endpoint: PUT /api/tasks/:id
        description: Submit updated task data
      - id: users-list
        endpoint: GET /api/users
        description: Fetch users for assignee selector
    screen_type: page
    navigates_to:
      - target: task-detail
        trigger: Click Cancel button
      - target: task-detail
        trigger: Click Save Changes and form submits successfully
      - target: delete-confirmation-modal
        trigger: Click Delete Task button
  - id: notifications-drawer
    name: Notifications
    route: /notifications
    description: A slide-in drawer from the right side showing the user's
      notifications list. Each notification shows an icon, message, timestamp,
      and read/unread state. Includes a Mark All Read action.
    status: draft
    designStatus: draft
    components:
      - id: drawer-header
        type: DrawerHeader
        description: Header with 'Notifications' title and a close (X) button
        props:
          title: Notifications
          showCloseButton: true
      - id: mark-all-read-btn
        type: Button
        description: Text button to mark all notifications as read
        props:
          label: Mark All as Read
          variant: ghost
      - id: notifications-list
        type: NotificationList
        description: Scrollable list of notification items, each with icon, message
          text, relative timestamp, and unread indicator dot
        props:
          emptyStateMessage: You're all caught up!
    dataSources:
      - id: notifications
        endpoint: GET /api/notifications
        description: Fetch all notifications for the current user
      - id: mark-all-read
        endpoint: PUT /api/notifications/mark-all-read
        description: Mark all notifications as read
    screen_type: drawer
    navigates_to:
      - target: task-detail
        trigger: Click a task-related notification item
  - id: delete-confirmation-modal
    name: Delete Task Confirmation
    route: /delete-task-confirmation
    description: A centered modal dialog asking the user to confirm deletion of a
      task. Shows a warning message with the task title and Cancel / Delete
      buttons.
    status: draft
    designStatus: draft
    components:
      - id: modal-icon
        type: Icon
        description: Warning/trash icon displayed prominently at top of modal
        props:
          name: trash
          color: coral-accent
          size: 48
      - id: modal-title
        type: Heading
        description: Modal title 'Delete Task'
        props:
          level: 2
          text: Delete Task
      - id: modal-body
        type: Text
        description: "Confirmation message: 'Are you sure you want to delete \"[task
          title]\"? This action cannot be undone.'"
        props:
          variant: body
      - id: modal-actions
        type: ButtonGroup
        description: Cancel and Delete buttons at the bottom of the modal
        props:
          buttons:
            - label: Cancel
              variant: secondary
            - label: Delete Task
              variant: danger
          alignment: right
    dataSources:
      - id: delete-task
        endpoint: DELETE /api/tasks/:id
        description: Delete the task by ID upon confirmation
    screen_type: modal
    navigates_to:
      - target: task-list
        trigger: Click Delete Task button and deletion succeeds
