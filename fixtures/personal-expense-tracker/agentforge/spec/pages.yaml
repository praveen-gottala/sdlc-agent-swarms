pages:
  - id: dashboard
    name: Dashboard
    description: The home screen showing monthly budget status, category breakdown
      donut chart, and a scrollable recent expenses list. Users can filter
      expenses by category, click rows to open detail popovers with edit/delete
      actions, navigate months via the top bar selector, and access the add
      expense flow from the empty state CTA. Real-time budget health indicators
      (on track, heads up, over budget) update reactively.
    route: /
    status: approved
    designStatus: rendered
    components:
      - TopBar
      - MonthSelector
      - SettingsDialog
      - BudgetSummaryCard
      - ProgressBar
      - CategoryDonutChart
      - CategoryLegend
      - RecentExpensesList
      - ExpenseRow
      - CategoryFilterDropdown
      - ExpenseDetailPopover
      - BudgetStatusBadge
      - EmptyState
      - NavigationTabs
    data_sources:
      - Expense
      - Category
      - Budget
      - PaymentMethod
    viewports:
      - 1440
    navigates_to:
      - target: add-expense
        trigger: Click 'Add Expense' button in NavigationTabs
      - target: add-expense
        trigger: Click 'Add Expense' CTA in EmptyState
      - target: add-expense
        trigger: Click 'Edit' action in ExpenseDetailPopover
      - target: spending-insights
        trigger: Click 'Insights' tab in NavigationTabs
      - target: add-expense
        trigger: button-primary
        source_node: topbar-add-btn
        mode: navigate
      - target: settings
        trigger: Open settings drawer
        source_node: topbar-logo
        mode: navigate
      - target: settings
        trigger: Open settings drawer
        source_node: topbar-logo
  - id: add-expense
    name: Add Expense
    description: A focused single-column form for logging new expenses or editing
      existing ones. Features a hero amount input with large numeric display, a
      category chip grid with new category creation, a mini calendar date
      picker, payment method chip selector, optional note input, and a
      full-width save CTA. Quick Add suggestion chips auto-fill the form from
      frequent past expenses. Pre-fills all fields when navigated from an Edit
      action on the dashboard.
    route: /add
    status: approved
    components:
      - TopBar
      - NavigationTabs
      - AmountHeroInput
      - CategoryChipGrid
      - NewCategoryInlineForm
      - ColorPickerRow
      - DatePickerInput
      - MiniCalendarDropdown
      - PaymentMethodChipRow
      - NoteInput
      - CharacterCounter
      - SaveExpenseButton
      - QuickAddSuggestions
      - QuickAddChip
      - MonthSelector
      - SettingsDialog
    data_sources:
      - Expense
      - Category
      - PaymentMethod
      - QuickAddSuggestion
    viewports:
      - 1440
    designStatus: rendered
    correctionIteration: 0
    designScore: null
    navigates_to:
      - target: dashboard
        trigger: Click 'Home' tab in NavigationTabs
      - target: dashboard
        trigger: Click SaveExpenseButton after filling the form
      - target: dashboard
        trigger: Click back arrow in TopBar
      - target: spending-insights
        trigger: Click 'Insights' tab in NavigationTabs
  - id: spending-insights
    name: Spending Insights
    description: An analytical view presenting spending patterns for the selected
      month. Contains a three-stat period summary header with trend indicators,
      a toggleable bar/line daily spending chart with average line, a top
      categories breakdown with stacked bar and per-row progress indicators, a
      biggest expenses ranked list, and a month-over-month comparison card with
      visual bars and a summary badge. An Export CSV button is right-aligned
      below all cards.
    route: /insights
    status: approved
    components:
      - TopBar
      - NavigationTabs
      - MonthSelector
      - SettingsDialog
      - PeriodSummaryHeader
      - StatCell
      - TrendIndicator
      - DailySpendingChart
      - ChartTypeToggle
      - ChartTooltip
      - AverageDashedLine
      - TopCategoriesCard
      - StackedCategoryBar
      - CategoryDetailRow
      - BiggestExpensesCard
      - RankedExpenseRow
      - MonthComparisonCard
      - ComparisonBars
      - SpendingDiffBadge
      - ExportCSVButton
      - NoDataEmptyState
    data_sources:
      - Expense
      - Category
      - Budget
      - DailyAggregate
      - CategoryAggregate
      - MonthlyComparison
    viewports:
      - 1440
    designStatus: rendered
    correctionIteration: 0
    designScore: null
    navigates_to:
      - target: dashboard
        trigger: Click 'Home' tab in NavigationTabs
      - target: add-expense
        trigger: Click 'Add Expense' tab in NavigationTabs
      - target: add-expense
        trigger: Click a RankedExpenseRow to edit the expense
