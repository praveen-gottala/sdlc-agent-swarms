version: "1.0"
models:
  - id: user
    name: User
    fields:
      - name: id
        type: uuid
        required: true
      - name: name
        type: string
        required: true
      - name: email
        type: string
        required: true
      - name: avatarUrl
        type: string
        required: false
      - name: role
        type: enum:admin,manager,member
        required: true
      - name: createdAt
        type: datetime
        required: true
      - name: updatedAt
        type: datetime
        required: true
  - id: task
    name: Task
    fields:
      - name: id
        type: uuid
        required: true
      - name: title
        type: string
        required: true
      - name: description
        type: text
        required: false
      - name: status
        type: enum:todo,in_progress,done,archived
        required: true
      - name: priority
        type: enum:low,medium,high,critical
        required: true
      - name: assigneeId
        type: uuid
        required: false
      - name: createdById
        type: uuid
        required: true
      - name: dueDate
        type: date
        required: false
      - name: tags
        type: string[]
        required: false
      - name: createdAt
        type: datetime
        required: true
      - name: updatedAt
        type: datetime
        required: true
  - id: subtask
    name: Subtask
    fields:
      - name: id
        type: uuid
        required: true
      - name: taskId
        type: uuid
        required: true
      - name: title
        type: string
        required: true
      - name: completed
        type: boolean
        required: true
      - name: createdAt
        type: datetime
        required: true
      - name: updatedAt
        type: datetime
        required: true
  - id: comment
    name: Comment
    fields:
      - name: id
        type: uuid
        required: true
      - name: taskId
        type: uuid
        required: true
      - name: authorId
        type: uuid
        required: true
      - name: body
        type: text
        required: true
      - name: createdAt
        type: datetime
        required: true
      - name: updatedAt
        type: datetime
        required: true
  - id: notification
    name: Notification
    fields:
      - name: id
        type: uuid
        required: true
      - name: userId
        type: uuid
        required: true
      - name: type
        type: enum:assignment,comment,due_reminder,status_change,mention
        required: true
      - name: message
        type: string
        required: true
      - name: taskId
        type: uuid
        required: false
      - name: read
        type: boolean
        required: true
      - name: createdAt
        type: datetime
        required: true
  - id: activity
    name: Activity
    fields:
      - name: id
        type: uuid
        required: true
      - name: taskId
        type: uuid
        required: true
      - name: actorId
        type: uuid
        required: true
      - name: action
        type: string
        required: true
      - name: metadata
        type: json
        required: false
      - name: createdAt
        type: datetime
        required: true
