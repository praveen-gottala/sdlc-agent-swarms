version: "1.0"
pages:
  - id: dashboard
    name: Dashboard
    route: /
    description: Main dashboard showing active tasks summary, team workload
      overview, and key metrics. Entry point of the app with navigation to task
      list and individual tasks.
    status: draft
    designStatus: draft
    components:
      - id: top-nav
        type: NavigationBar
        description: Top navigation bar with TaskPilot logo, main nav links (Dashboard,
          Tasks), and bell icon button to open notifications drawer
        props:
          logo: TaskPilot
          links:
            - Dashboard
            - Tasks
          actions:
            - NotificationBell
      - id: dashboard-heading
        type: PageHeader
        description: Heading-1 styled welcome heading and subtitle showing today's date
        props:
          title: Good morning, Team 👋
          subtitle: Here's what's on your plate today.
      - id: stats-row
        type: StatsCardRow
        description: "Row of 4 summary stat cards: Total Active Tasks, Completed Today,
          Overdue Tasks, Team Members Online"
        props:
          cards:
            - label: Active Tasks
              valueKey: activeTasks
            - label: Completed Today
              valueKey: completedToday
            - label: Overdue
              valueKey: overdueTasks
            - label: Team Online
              valueKey: teamOnline
      - id: active-tasks-list
        type: TaskCardList
        description: Scrollable list of active task cards showing task title, assignee
          avatar, priority badge, due date, and status. Each card is clickable
          to navigate to task detail.
        props:
          title: Active Tasks
          limit: 8
          showViewAll: true
      - id: team-workload-chart
        type: TeamWorkloadChart
        description: Horizontal bar chart showing each team member's assigned task count
          versus their capacity, using deep-teal and coral-accent colors
        props:
          title: Team Workload
    dataSources:
      - id: dashboard-stats
        endpoint: GET /api/tasks/stats
        description: Fetches aggregate task statistics for dashboard stat cards
      - id: active-tasks
        endpoint: GET /api/tasks?status=active&limit=8
        description: Fetches recent active tasks for dashboard task list
      - id: team-workload
        endpoint: GET /api/users/workload
        description: Fetches per-user task assignment counts and capacity
    screen_type: page
    navigates_to:
      - target: task-list
        trigger: Click 'Tasks' in navigation bar
        mode: overlay
      - target: task-list
        trigger: Click 'View All' on active tasks list
      - target: task-detail
        trigger: Click a task card in Active Tasks list
      - target: notifications-drawer
        trigger: Click bell icon in navigation bar
  - id: task-list
    name: Task List
    route: /tasks
    description: Full paginated task list with filtering by status, priority, and
      assignee, plus search and sorting controls. Allows creating new tasks and
      navigating to task detail.
    status: draft
    designStatus: draft
    components:
      - id: top-nav
        type: NavigationBar
        description: Top navigation bar with TaskPilot logo, main nav links (Dashboard,
          Tasks), and bell icon button to open notifications drawer
        props:
          logo: TaskPilot
          links:
            - Dashboard
            - Tasks
          actions:
            - NotificationBell
      - id: task-list-header
        type: PageHeader
        description: Page title 'Tasks' and a primary CTA button 'New Task' that opens
          the create task modal
        props:
          title: Tasks
          primaryAction:
            label: New Task
            icon: plus
      - id: filter-bar
        type: FilterBar
        description: "Horizontal filter controls: search input, status dropdown (All,
          Active, Completed, Overdue), priority dropdown (All, High, Medium,
          Low), assignee multi-select, and sort-by selector"
        props:
          filters:
            - search
            - status
            - priority
            - assignee
            - sortBy
      - id: task-table
        type: TaskTable
        description: "Paginated table listing tasks with columns: checkbox, Title,
          Assignee, Priority badge, Status badge, Due Date, Actions
          (edit/delete). Rows are clickable to open task detail."
        props:
          columns:
            - select
            - title
            - assignee
            - priority
            - status
            - dueDate
            - actions
          pageSize: 20
          pagination: true
      - id: bulk-action-bar
        type: BulkActionBar
        description: "Appears when one or more tasks are checked. Shows count of
          selected tasks and bulk action buttons: Mark Complete, Reassign,
          Delete Selected."
        props:
          actions:
            - markComplete
            - reassign
            - deleteSelected
    dataSources:
      - id: tasks
        endpoint: GET /api/tasks
        description: Fetches paginated, filtered, and sorted task list based on active
          filter bar state
      - id: users-list
        endpoint: GET /api/users
        description: Fetches list of team members for assignee filter dropdown
    screen_type: page
    navigates_to:
      - target: dashboard
        trigger: Click 'Dashboard' in navigation bar
      - target: task-detail
        trigger: Click a task row in the task table
      - target: task-create-modal
        trigger: Click 'New Task' button
      - target: delete-confirmation-modal
        trigger: Click delete icon in task row Actions
      - target: notifications-drawer
        trigger: Click bell icon in navigation bar
  - id: task-detail
    name: Task Detail
    route: /tasks/:id
    description: Full detail view of a single task, showing all task fields,
      activity log, comments, and allowing editing of task properties or
      deletion via confirmation modal.
    status: draft
    designStatus: draft
    components:
      - id: top-nav
        type: NavigationBar
        description: Top navigation bar with TaskPilot logo, main nav links (Dashboard,
          Tasks), and bell icon button to open notifications drawer
        props:
          logo: TaskPilot
          links:
            - Dashboard
            - Tasks
          actions:
            - NotificationBell
      - id: breadcrumb
        type: Breadcrumb
        description: "Breadcrumb trail: Dashboard > Tasks > [Task Title] for easy back
          navigation"
        props:
          items:
            - Dashboard
            - Tasks
            - Task Title
      - id: task-detail-header
        type: TaskDetailHeader
        description: "Task title (editable inline), status badge with dropdown to change
          status, priority badge, and action buttons: Edit, Delete"
        props:
          editable: true
          actions:
            - Edit
            - Delete
      - id: task-meta-panel
        type: TaskMetaPanel
        description: "Side panel showing task metadata: Assignee (avatar + name), Due
          Date with date picker, Created By, Created At, Tags, and Description
          rich text area"
        props:
          fields:
            - assignee
            - dueDate
            - createdBy
            - createdAt
            - tags
            - description
      - id: task-activity-log
        type: ActivityLog
        description: Chronological list of activity events (status changes, assignments,
          comments) with user avatar, action description, and timestamp
        props:
          showTimestamps: true
      - id: comment-input
        type: CommentInput
        description: Text area for adding a new comment with a 'Post Comment' submit button
        props:
          placeholder: Add a comment…
          submitLabel: Post Comment
    dataSources:
      - id: task-detail-data
        endpoint: GET /api/tasks/:id
        description: Fetches full task detail including description, metadata, and relations
      - id: task-comments
        endpoint: GET /api/tasks/:id/comments
        description: Fetches comments for the task
      - id: task-activity
        endpoint: GET /api/tasks/:id/activity
        description: Fetches activity log entries for the task
    screen_type: page
    navigates_to:
      - target: dashboard
        trigger: Click 'Dashboard' in navigation bar
      - target: task-list
        trigger: Click 'Tasks' in navigation bar or breadcrumb
      - target: delete-confirmation-modal
        trigger: Click 'Delete' action button
      - target: notifications-drawer
        trigger: Click bell icon in navigation bar
  - id: task-create-modal
    name: Create Task
    route: /create-task
    description: Centered modal overlay for creating a new task. Contains a form
      with all required task fields. Dismissible by clicking the backdrop or
      Cancel button.
    status: draft
    designStatus: draft
    components:
      - id: modal-header
        type: ModalHeader
        description: Modal title 'New Task' and an X close button
        props:
          title: New Task
      - id: task-form
        type: TaskForm
        description: "Form fields: Title (required text input), Description (textarea),
          Assignee (user select), Priority (radio/select: High/Medium/Low),
          Status (select: Active/Completed), Due Date (date picker), Tags (multi
          text input)"
        props:
          fields:
            - title
            - description
            - assignee
            - priority
            - status
            - dueDate
            - tags
          mode: create
      - id: modal-actions
        type: ModalFooterActions
        description: Footer with 'Cancel' (ghost button, closes modal) and 'Create Task'
          (primary button, submits form)
        props:
          cancelLabel: Cancel
          submitLabel: Create Task
    dataSources:
      - id: users-for-assign
        endpoint: GET /api/users
        description: Fetches team members to populate assignee select
    screen_type: modal
    navigates_to:
      - target: task-list
        trigger: Click 'Cancel' or close button (dismiss modal)
      - target: task-detail
        trigger: Successfully submit 'Create Task' form — navigates to new task
  - id: delete-confirmation-modal
    name: Delete Confirmation
    route: /delete-confirmation
    description: "Centered modal overlay asking the user to confirm deletion of a
      task. Shows the task title and two actions: Cancel and Delete. Appears
      above current page."
    status: draft
    designStatus: draft
    components:
      - id: confirm-modal-header
        type: ModalHeader
        description: Modal title 'Delete Task' and X close button
        props:
          title: Delete Task
      - id: confirm-body
        type: ConfirmationBody
        description: Warning icon, confirmation message 'Are you sure you want to delete
          [Task Title]? This action cannot be undone.' with task title
          highlighted
        props:
          icon: warning
          messageTemplate: Are you sure you want to delete "{taskTitle}"? This action
            cannot be undone.
      - id: confirm-actions
        type: ModalFooterActions
        description: Footer with 'Cancel' (ghost button, closes modal) and 'Delete Task'
          (destructive/coral-accent primary button, confirms deletion)
        props:
          cancelLabel: Cancel
          submitLabel: Delete Task
          submitVariant: destructive
    dataSources: []
    screen_type: modal
    navigates_to:
      - target: task-list
        trigger: Click 'Delete Task' confirm button — deletes task and returns to task
          list
      - target: task-list
        trigger: Click 'Cancel' or close button (dismiss modal, stay on current page)
  - id: notifications-drawer
    name: Notifications
    route: /notifications
    description: Right-side drawer panel that slides in when the bell icon in the
      navigation bar is clicked. Shows a list of recent notifications with
      mark-as-read actions and a 'Mark All Read' control.
    status: draft
    designStatus: draft
    components:
      - id: drawer-header
        type: DrawerHeader
        description: Drawer title 'Notifications', unread count badge, 'Mark All Read'
          text button, and X close button
        props:
          title: Notifications
          showUnreadCount: true
          actions:
            - Mark All Read
      - id: notification-list
        type: NotificationList
        description: "Scrollable list of notification items. Each item shows: user
          avatar, notification message (e.g. 'Alex assigned you a task'),
          relative timestamp, and an unread dot indicator. Clicking a
          notification marks it as read and navigates to the relevant task."
        props:
          emptyState: You're all caught up! 🎉
      - id: drawer-footer
        type: DrawerFooter
        description: Link to a future full notifications page, currently reads 'View All
          Notifications'
        props:
          linkLabel: View All Notifications
    dataSources:
      - id: notifications
        endpoint: GET /api/notifications
        description: Fetches current user's notifications sorted by recency
    screen_type: drawer
    navigates_to:
      - target: task-detail
        trigger: Click a notification item linked to a specific task
