version: "1.0"
created_by: agentforge-init-llm
colors:
  primitive:
    deep-navy: "#0F172A"
    navy-surface: "#1E293B"
    navy-raised: "#293548"
    slate-border: "#334155"
    silver-text: "#CBD5E1"
    muted-text: "#64748B"
    gold-amber: "#F59E0B"
    gold-light: "#FEF3C7"
    teal-success: "#14B8A6"
    coral-error: "#F87171"
  semantic:
    background-primary: deep-navy
    surface-primary: navy-surface
    surface-elevated: navy-raised
    text-primary: silver-text
    text-secondary: muted-text
    text-disabled: muted-text
    text-on-cta: deep-navy
    cta-primary: gold-amber
    cta-hover: "#D97706"
    border-default: slate-border
    border-focus: gold-amber
    border-error: coral-error
    error: coral-error
    success: teal-success
    warning: gold-amber
    info: "#38BDF8"
    overlay: rgba(0,0,0,0.65)
    surface-secondary: deep-navy
    surface-input: deep-navy
typography:
  font_families:
    display: DM Sans
    body: DM Mono
  scale:
    - role: heading-1
      size: 24
      weight: 700
      family: display
      line_height: 1.3
    - role: heading-2
      size: 16
      weight: 600
      family: display
      line_height: 1.4
    - role: heading-3
      size: 15
      weight: 500
      family: display
      line_height: 1.4
    - role: body
      size: 14
      weight: 400
      family: body
      line_height: 1.6
    - role: label
      size: 12
      weight: 500
      family: body
      line_height: 1.4
    - role: small
      size: 11
      weight: 400
      family: body
      line_height: 1.4
spacing:
  unit: 8
  scale:
    - 4
    - 8
    - 12
    - 16
    - 24
    - 32
    - 48
    - 64
borders:
  radius:
    small: 6
    medium: 10
    large: 16
    pill: 9999
touch_targets:
  minimum_height: 44
  minimum_width: 44
elevation:
  levels:
    - level: 0
      shadow: none
      description: Flat background elements
    - level: 1
      shadow: 0 1px 4px rgba(0,0,0,0.3)
      description: Cards on dark surface
    - level: 2
      shadow: 0 4px 16px rgba(0,0,0,0.4)
      description: Dropdowns and popovers
    - level: 3
      shadow: 0 12px 32px rgba(0,0,0,0.5)
      description: Modals and overlays
layout:
  grid:
    columns: 12
    gutter: 24
    margin: 24
  content_max_width: 1280
  breakpoints:
    mobile: 640
    tablet: 768
    desktop: 1024
    wide: 1440
z_index:
  dropdown: 1000
  sticky: 1100
  modal: 1200
  toast: 1300
  tooltip: 1400
opacity:
  scale:
    subtle: 0.1
    muted: 0.3
    disabled: 0.38
    overlay: 0.5
motion:
  durations:
    fast: 150
    normal: 300
    slow: 600
  easings:
    default: cubic-bezier(0.4,0,0.2,1)
    emphasized: cubic-bezier(0.4,0,0,1)
state:
  hover_opacity: 0.08
  disabled_opacity: 0.38
  focus_ring:
    color: cta-primary
    width: 2
    offset: 2
