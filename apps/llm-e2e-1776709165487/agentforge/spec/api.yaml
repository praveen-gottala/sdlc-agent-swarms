version: "1.0"
endpoints:
  - method: GET
    path: /api/dashboard/stats
    description: "Returns summary statistics for the dashboard: active task count,
      completed today count, overdue task count, and total team member count"
  - method: GET
    path: /api/dashboard/workload
    description: "Returns team workload data: array of users with their assigned
      task count and capacity for the workload chart"
  - method: GET
    path: /api/tasks
    description: "Returns a paginated list of tasks. Supports query params: status,
      priority, assigneeId, search (title search), sort
      (dueDate|priority|createdAt|title), order (asc|desc), page, limit"
  - method: POST
    path: /api/tasks
    description: "Creates a new task. Request body: title (required), description,
      status, priority, assigneeId, dueDate, tags"
  - method: GET
    path: /api/tasks/:taskId
    description: Returns full task detail by ID including assignee and creator user objects
  - method: PUT
    path: /api/tasks/:taskId
    description: "Updates an existing task by ID. Accepts partial body with any
      updatable fields: title, description, status, priority, assigneeId,
      dueDate, tags"
  - method: DELETE
    path: /api/tasks/:taskId
    description: Deletes a task by ID. Also deletes associated subtasks, comments,
      and activity records
  - method: PATCH
    path: /api/tasks/bulk
    description: "Performs a bulk action on multiple tasks. Request body: taskIds
      (array), action (mark_complete | delete)"
  - method: GET
    path: /api/tasks/:taskId/comments
    description: Returns all comments and activity log entries for a task, merged
      and ordered chronologically
  - method: POST
    path: /api/tasks/:taskId/comments
    description: "Adds a new comment to a task. Request body: body (required)"
  - method: GET
    path: /api/tasks/:taskId/subtasks
    description: Returns all subtasks for a given task
  - method: POST
    path: /api/tasks/:taskId/subtasks
    description: "Creates a new subtask under a task. Request body: title (required)"
  - method: PUT
    path: /api/tasks/:taskId/subtasks/:subtaskId
    description: "Updates a subtask (title or completed status). Request body:
      title, completed"
  - method: DELETE
    path: /api/tasks/:taskId/subtasks/:subtaskId
    description: Deletes a specific subtask
  - method: GET
    path: /api/users
    description: Returns list of all team member users with id, name, email,
      avatarUrl, and role. Used for assignee selectors and filter dropdowns
  - method: GET
    path: /api/users/:userId
    description: Returns a single user's profile details by ID
  - method: GET
    path: /api/notifications
    description: "Returns notifications for the authenticated user. Supports query
      params: filter (all|unread|mentions), page, limit"
  - method: PUT
    path: /api/notifications/read
    description: "Marks notifications as read. Request body: notificationIds (array
      of IDs to mark read, or empty to mark all read), all (boolean)"
