version: "1.0"
base_url: /api
endpoints:
  - id: get-products
    method: GET
    path: /api/products
    description: Retrieve paginated list of products with optional filtering and search
    query_params:
      - name: page
        type: integer
      - name: limit
        type: integer
      - name: search
        type: string
      - name: category
        type: string
      - name: roast_level
        type: string
      - name: min_price
        type: decimal
      - name: max_price
        type: decimal
      - name: sort
        type: string
    response:
      type: object
      schema_ref: Product
    auth: none
    status: planned
  - id: get-product
    method: GET
    path: /api/products/:id
    description: Retrieve detailed information for a specific product
    query_params: []
    response:
      type: object
      schema_ref: Product
    auth: none
    status: planned
  - id: get-categories
    method: GET
    path: /api/categories
    description: Retrieve all product categories
    query_params: []
    response:
      type: array
      schema_ref: Category
    auth: none
    status: planned
  - id: get-cart
    method: GET
    path: /api/cart
    description: Retrieve current user's cart items
    query_params: []
    response:
      type: array
      schema_ref: CartItem
    auth: required
    status: planned
  - id: add-to-cart
    method: POST
    path: /api/cart/items
    description: Add a product to the user's cart
    query_params: []
    response:
      type: object
      schema_ref: CartItem
    auth: required
    status: planned
  - id: update-cart-item
    method: PUT
    path: /api/cart/items/:id
    description: Update quantity or options for a cart item
    query_params: []
    response:
      type: object
      schema_ref: CartItem
    auth: required
    status: planned
  - id: remove-cart-item
    method: DELETE
    path: /api/cart/items/:id
    description: Remove an item from the cart
    query_params: []
    response:
      type: object
      schema_ref: null
    auth: required
    status: planned
  - id: create-order
    method: POST
    path: /api/orders
    description: Create a new order from cart items
    query_params: []
    response:
      type: object
      schema_ref: Order
    auth: required
    status: planned
  - id: get-orders
    method: GET
    path: /api/orders
    description: Retrieve user's order history
    query_params:
      - name: page
        type: integer
      - name: limit
        type: integer
    response:
      type: array
      schema_ref: Order
    auth: required
    status: planned
  - id: get-order
    method: GET
    path: /api/orders/:id
    description: Retrieve detailed information for a specific order
    query_params: []
    response:
      type: object
      schema_ref: Order
    auth: required
    status: planned
  - id: get-product-reviews
    method: GET
    path: /api/products/:id/reviews
    description: Retrieve reviews for a specific product
    query_params:
      - name: page
        type: integer
      - name: limit
        type: integer
      - name: sort
        type: string
    response:
      type: array
      schema_ref: Review
    auth: none
    status: planned
  - id: create-review
    method: POST
    path: /api/products/:id/reviews
    description: Create a new review for a product
    query_params: []
    response:
      type: object
      schema_ref: Review
    auth: required
    status: planned
  - id: get-user-profile
    method: GET
    path: /api/user/profile
    description: Retrieve current user's profile information
    query_params: []
    response:
      type: object
      schema_ref: User
    auth: required
    status: planned
  - id: update-user-profile
    method: PUT
    path: /api/user/profile
    description: Update user's profile information
    query_params: []
    response:
      type: object
      schema_ref: User
    auth: required
    status: planned
  - id: get-user-addresses
    method: GET
    path: /api/user/addresses
    description: Retrieve user's saved addresses
    query_params: []
    response:
      type: array
      schema_ref: Address
    auth: required
    status: planned
  - id: create-address
    method: POST
    path: /api/user/addresses
    description: Create a new address for the user
    query_params: []
    response:
      type: object
      schema_ref: Address
    auth: required
    status: planned
  - id: validate-promo-code
    method: POST
    path: /api/promo-codes/validate
    description: Validate and apply a promo code to cart
    query_params: []
    response:
      type: object
      schema_ref: PromoCode
    auth: required
    status: planned
