version: "1.0"
endpoints:
  - method: GET
    path: /api/tasks
    description: "List all tasks with optional query params: status, priority,
      search (title/description), sort (field), order (asc/desc), page, limit"
  - method: POST
    path: /api/tasks
    description: "Create a new task. Body: title (required), description, status
      (required), priority (required), dueDate, assigneeId"
  - method: GET
    path: /api/tasks/stats
    description: "Return aggregate statistics: totalTasks, completed, inProgress,
      todo, overdue counts for the dashboard summary cards"
  - method: GET
    path: /api/tasks/:id
    description: Get full details of a single task by ID
  - method: PUT
    path: /api/tasks/:id
    description: "Update an existing task by ID. Body can include any subset of:
      title, description, status, priority, dueDate, assigneeId"
  - method: DELETE
    path: /api/tasks/:id
    description: Permanently delete a task by ID. Also deletes associated comments
      and activity records.
  - method: GET
    path: /api/tasks/:id/comments
    description: Get all comments and activity entries for a task, ordered chronologically
  - method: POST
    path: /api/tasks/:id/comments
    description: "Add a new comment to a task. Body: body (required)"
  - method: DELETE
    path: /api/tasks/:id/comments/:commentId
    description: Delete a specific comment on a task by comment ID
  - method: GET
    path: /api/users
    description: List all users. Used for assignee selection dropdowns in task
      create/edit forms.
  - method: GET
    path: /api/users/:id
    description: Get a single user's profile by ID
  - method: GET
    path: /api/notifications
    description: Get all notifications for the authenticated user, ordered by
      createdAt descending. Includes isRead status.
  - method: PUT
    path: /api/notifications/mark-all-read
    description: Mark all of the authenticated user's notifications as read (isRead = true)
  - method: PUT
    path: /api/notifications/:id/read
    description: Mark a single notification as read by notification ID
