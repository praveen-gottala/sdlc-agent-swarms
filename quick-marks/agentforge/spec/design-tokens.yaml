version: "1.0"
created_by: agentforge-init-llm
colors:
  primitive:
    void-950: "#09090B"
    slate-900: "#18181B"
    slate-800: "#27272A"
    slate-600: "#52525B"
    slate-400: "#A1A1AA"
    zinc-200: "#E4E4E7"
    electric-violet: "#7C3AED"
    violet-400: "#A78BFA"
    violet-600: "#6D28D9"
    neon-green: "#22C55E"
    rose-500: "#F43F5E"
    amber-400: "#FBBF24"
    cyan-400: "#22D3EE"
  semantic:
    background-primary: "#09090B"
    surface-primary: "#18181B"
    surface-elevated: "#27272A"
    surface-secondary: "#27272A"
    surface-input: "#18181B"
    text-primary: "#E4E4E7"
    text-secondary: "#A1A1AA"
    text-disabled: "#52525B"
    text-on-cta: "#FFFFFF"
    cta-primary: "#7C3AED"
    cta-hover: "#6D28D9"
    border-default: "#52525B"
    border-focus: "#A78BFA"
    border-error: "#F43F5E"
    error: "#F43F5E"
    success: "#22C55E"
    warning: "#FBBF24"
    info: "#22D3EE"
    overlay: rgba(9, 9, 11, 0.70)
typography:
  font_families:
    display: Space Grotesk
    body: JetBrains Mono
  scale:
    - role: heading-1
      size: 32
      weight: 700
      family: display
      line_height: 1.2
    - role: heading-2
      size: 24
      weight: 700
      family: display
      line_height: 1.25
    - role: heading-3
      size: 18
      weight: 600
      family: display
      line_height: 1.3
    - role: body
      size: 14
      weight: 400
      family: body
      line_height: 1.5
    - role: label
      size: 12
      weight: 500
      family: body
      line_height: 1.4
    - role: small
      size: 11
      weight: 400
      family: body
      line_height: 1.4
spacing:
  unit: 8
  scale:
    - 4
    - 8
    - 12
    - 16
    - 24
    - 32
    - 48
    - 64
borders:
  radius:
    small: 8
    medium: 12
    large: 16
    pill: 9999
touch_targets:
  minimum_height: 44
  minimum_width: 44
elevation:
  levels:
    - level: 0
      shadow: none
      description: Flat — void-950 base layer. Background sections need no shadow;
        contrast handles separation.
    - level: 1
      shadow: 0 1px 4px rgba(0, 0, 0, 0.50), 0 0 0 1px rgba(124, 58, 237, 0.08)
      description: Cards — dark drop shadow plus a whisper of violet border glow.
        BookmarkCard feels lifted off the void without becoming garish.
    - level: 2
      shadow: 0 4px 16px rgba(0, 0, 0, 0.60), 0 0 0 1px rgba(124, 58, 237, 0.15)
      description: Dropdowns — deeper black shadow with a more visible violet rim.
        Floats clearly above card layer.
    - level: 3
      shadow: 0 16px 48px rgba(0, 0, 0, 0.75), 0 0 0 1px rgba(167, 139, 250, 0.20), 0
        0 32px rgba(124, 58, 237, 0.12)
      description: "Toasts and critical overlays. Triple-layer: deep black drop,
        subtle violet ring, and a faint ambient violet bloom for dramatic
        presence."
layout:
  grid:
    columns: 12
    gutter: 24
    margin: 24
  content_max_width: 1280
  breakpoints:
    mobile: 640
    tablet: 768
    desktop: 1024
    wide: 1440
z_index:
  dropdown: 1000
  sticky: 1100
  modal: 1200
  toast: 1300
  tooltip: 1400
opacity:
  scale:
    subtle: 0.1
    muted: 0.3
    disabled: 0.38
    overlay: 0.5
motion:
  durations:
    fast: 100
    normal: 200
    slow: 400
    page: 600
  easings:
    default: ease-out
    emphasized: cubic-bezier(0.2,0,0,1)
state:
  hover_opacity: 0.08
  disabled_opacity: 0.38
  focus_ring:
    color: cta-primary
    width: 2
    offset: 2
