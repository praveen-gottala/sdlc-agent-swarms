version: "1.0"
created_by: agentforge-init-llm
colors:
  primitive:
    warm-white: "#FAFAF7"
    stone-100: "#F5F4F0"
    stone-300: "#D6D3CC"
    charcoal-900: "#1C1917"
    charcoal-600: "#57534E"
    teal-600: "#0D9488"
    teal-700: "#0F766E"
    amber-500: "#F59E0B"
  semantic:
    background-primary: warm-white
    surface-primary: "#FFFFFF"
    surface-elevated: "#FFFFFF"
    text-primary: charcoal-900
    text-secondary: charcoal-600
    text-disabled: stone-300
    text-on-cta: "#FFFFFF"
    cta-primary: teal-600
    cta-hover: teal-700
    border-default: stone-300
    border-focus: teal-600
    border-error: "#DC2626"
    error: "#DC2626"
    success: "#15803D"
    warning: amber-500
    info: teal-600
    overlay: rgba(28,25,23,0.45)
    surface-secondary: stone-100
    surface-input: "#FFFFFF"
typography:
  font_families:
    display: DM Sans
    body: Source Sans 3
  scale:
    - role: heading-1
      size: 28
      weight: 700
      family: display
      line_height: 1.25
    - role: heading-2
      size: 22
      weight: 600
      family: display
      line_height: 1.35
    - role: heading-3
      size: 17
      weight: 600
      family: display
      line_height: 1.45
    - role: body
      size: 15
      weight: 400
      family: body
      line_height: 1.65
    - role: label
      size: 13
      weight: 500
      family: body
      line_height: 1.4
    - role: small
      size: 12
      weight: 400
      family: body
      line_height: 1.5
spacing:
  unit: 8
  scale:
    - 4
    - 8
    - 12
    - 16
    - 24
    - 32
    - 48
    - 64
borders:
  radius:
    small: 6
    medium: 10
    large: 16
    pill: 9999
touch_targets:
  minimum_height: 44
  minimum_width: 44
elevation:
  levels:
    - level: 0
      shadow: none
      description: Flat — page background, dividers, inline labels
    - level: 1
      shadow: 0 1px 3px rgba(28,25,23,0.07), 0 1px 2px rgba(28,25,23,0.04)
      description: Cards, stat tiles, list rows
    - level: 2
      shadow: 0 4px 12px rgba(28,25,23,0.09)
      description: Dropdowns, date pickers, contextual menus
    - level: 3
      shadow: 0 16px 32px rgba(28,25,23,0.13)
      description: Modals, slide-over panels, confirmation dialogs
layout:
  grid:
    columns: 12
    gutter: 24
    margin: 24
  content_max_width: 1280
  breakpoints:
    mobile: 640
    tablet: 768
    desktop: 1024
    wide: 1440
z_index:
  dropdown: 1000
  sticky: 1100
  modal: 1200
  toast: 1300
  tooltip: 1400
opacity:
  scale:
    subtle: 0.1
    muted: 0.3
    disabled: 0.38
    overlay: 0.5
motion:
  durations:
    fast: 150
    normal: 280
    slow: 450
  easings:
    default: cubic-bezier(0.25,0.1,0.25,1)
    emphasized: cubic-bezier(0.34,1.56,0.64,1)
state:
  hover_opacity: 0.08
  disabled_opacity: 0.38
  focus_ring:
    color: cta-primary
    width: 2
    offset: 2
