version: "1.0"
created_by: agentforge-init-llm
colors:
  primitive:
    deep-cocoa: "#1A0F0A"
    rich-espresso: "#241510"
    burnt-mahogany: "#2E1B12"
    toasted-umber: "#3D2518"
    ember-orange: "#FF6B2B"
    flame-red: "#FF3D1F"
    golden-yellow: "#FFD23F"
    warm-cream: "#FFF4E6"
    soft-peach: "#FFCBA4"
    muted-sand: "#9C7B62"
    ash-gray: "#5C4035"
    pixel-green: "#4ADE80"
    cobalt-blue: "#3B82F6"
    pale-rose: "#FF8FA3"
  semantic:
    background-primary: deep-cocoa
    surface-primary: burnt-mahogany
    surface-elevated: toasted-umber
    surface-secondary: rich-espresso
    surface-input: toasted-umber
    text-primary: warm-cream
    text-secondary: soft-peach
    text-disabled: ash-gray
    text-on-cta: deep-cocoa
    cta-primary: ember-orange
    cta-hover: golden-yellow
    border-default: toasted-umber
    border-focus: golden-yellow
    border-error: flame-red
    error: flame-red
    success: pixel-green
    warning: golden-yellow
    info: cobalt-blue
    overlay: rgba(26, 15, 10, 0.88)
typography:
  font_families:
    display: Press Start 2P
    body: Nunito
  scale:
    - role: heading-1
      size: 32
      weight: 700
      family: display
      line_height: 1.2
    - role: heading-2
      size: 24
      weight: 700
      family: display
      line_height: 1.25
    - role: heading-3
      size: 18
      weight: 600
      family: display
      line_height: 1.3
    - role: body
      size: 14
      weight: 400
      family: body
      line_height: 1.5
    - role: label
      size: 12
      weight: 500
      family: body
      line_height: 1.4
    - role: small
      size: 11
      weight: 400
      family: body
      line_height: 1.4
spacing:
  unit: 8
  scale:
    - 4
    - 8
    - 12
    - 16
    - 24
    - 32
    - 48
    - 64
borders:
  radius:
    small: 8
    medium: 12
    large: 16
    pill: 9999
touch_targets:
  minimum_height: 44
  minimum_width: 44
elevation:
  levels:
    - level: 1
      shadow: 2px 2px 0px rgba(255, 107, 43, 0.4)
      description: Flat — pixel-style offset shadow for inline badges and tags
    - level: 2
      shadow: 4px 4px 0px rgba(255, 107, 43, 0.5), 0 2px 12px rgba(0, 0, 0, 0.4)
      description: Cards — chunky pixel-shadow lift with warm amber offset for game cards
    - level: 3
      shadow: 6px 6px 0px rgba(255, 107, 43, 0.45), 0 4px 20px rgba(0, 0, 0, 0.5)
      description: Dropdowns — deeper pixel offset for menus and queue panels
    - level: 4
      shadow: 8px 8px 0px rgba(255, 107, 43, 0.5), 0 8px 40px rgba(0, 0, 0, 0.65), 0
        2px 4px rgba(255, 210, 63, 0.2)
      description: Modals — maximum pixel-boss energy with golden accent for result screens
layout:
  grid:
    columns: 12
    gutter: 24
    margin: 24
  content_max_width: 1280
  breakpoints:
    mobile: 640
    tablet: 768
    desktop: 1024
    wide: 1440
z_index:
  dropdown: 1000
  sticky: 1100
  modal: 1200
  toast: 1300
  tooltip: 1400
opacity:
  scale:
    subtle: 0.1
    muted: 0.3
    disabled: 0.38
    overlay: 0.5
motion:
  durations:
    fast: 100
    normal: 200
    slow: 400
    page: 600
  easings:
    default: ease-out
    emphasized: cubic-bezier(0.2,0,0,1)
state:
  hover_opacity: 0.08
  disabled_opacity: 0.38
  focus_ring:
    color: cta-primary
    width: 2
    offset: 2
