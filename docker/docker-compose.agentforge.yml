version: "3.8"

services:
  agentforge-postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: agentforge
      POSTGRES_PASSWORD: agentforge_dev
      POSTGRES_DB: agentforge
    ports:
      - "5433:5432"
    volumes:
      - agentforge_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentforge"]
      interval: 5s
      timeout: 5s
      retries: 5

  agentforge-qdrant:
    image: qdrant/qdrant:v1.14.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - agentforge_qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  agentforge_pgdata:
  agentforge_qdrant:
