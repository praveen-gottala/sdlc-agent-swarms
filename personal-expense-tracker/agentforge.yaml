version: "1.0"
project:
  name: Personal Expense Tracker
  id: proj_personal_expense_tracker_zq525x
  platforms:
    - web
stack:
  frontend: react
  backend: node
  database: postgresql
  styling: tailwind
repo:
  provider: github
  org: ""
  name: ""
agents:
  providers:
    default: claude-sonnet-4-6
    overrides:
      architecture: claude-opus-4-6
      code_review: claude-haiku-4-5
  sandbox:
    type: github_actions
    timeout_minutes: 15
    max_retries: 3
  orchestration:
    max_concurrent_agents: 3
    ci_wait_strategy: spawn_next
hitl:
  default: review_and_override
  overrides:
    design: full_approval
    production_deploy: full_approval
    test_generation: notify_only
channels:
  - type: slack
    capabilities: full
    priority: 1
  - type: cli
    capabilities: basic
    priority: 3
routing:
  approval_requests: all
  status_updates: primary
  critical_alerts: all
budget:
  per_task_max_usd: 2
  per_phase_max_usd: 25
  monthly_max_usd: 200
  alert_threshold: 0.8
design:
  primary_viewport: 1440
  layout_strategy: desktop-first
  responsive_breakpoints: false
