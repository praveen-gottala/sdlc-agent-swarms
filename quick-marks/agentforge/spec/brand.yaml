version: "1.0"
created_by: agentforge-init-llm
identity:
  tone: Direct, technical, and a little rebellious. No hand-holding. Treats the
    user as a capable developer who wants their tool to be as fast as their
    thinking.
  audience: general
illustration_style:
  direction: Isometric pixel-grid technical art
  description: "Dark-background isometric illustrations built on a fine dot-grid.
    Motifs: circuit-board traces, glowing link-chain icons, stacked card layers
    with violet glow edges. Color palette restricted to void-950 backgrounds,
    slate-800 structures, and electric-violet plus cyan-400 accent glows. A
    subtle scanline texture overlay (5% opacity) adds depth. Feels like a
    terminal that gained taste."
motion_principles:
  page_transitions: fade
  interaction_feel: snappy
  easing: ease-out
  duration_base_ms: 200
accessibility:
  wcag_level: AA
