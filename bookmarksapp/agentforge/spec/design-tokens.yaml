version: "1.0"
created_by: agentforge-init-llm
colors:
  primitive:
    ink-950: "#0D0F12"
    ink-800: "#1E2228"
    ink-600: "#3A414D"
    ink-300: "#8C95A3"
    ink-100: "#D6DBE3"
    ink-50: "#EEF1F5"
    ink-0: "#F8F9FB"
    white: "#FFFFFF"
    indigo-500: "#4F6AFF"
    indigo-600: "#3A54E8"
    red-500: "#E53E3E"
    green-500: "#2F9E5A"
    amber-400: "#F5A623"
    sky-500: "#0EA5E9"
  semantic:
    background-primary: ink-0
    surface-primary: white
    surface-elevated: white
    surface-secondary: ink-50
    surface-input: white
    text-primary: ink-950
    text-secondary: ink-600
    text-disabled: ink-300
    text-on-cta: white
    cta-primary: indigo-500
    cta-hover: indigo-600
    border-default: ink-100
    border-focus: indigo-500
    border-error: red-500
    error: red-500
    success: green-500
    warning: amber-400
    info: sky-500
    overlay: rgba(13, 15, 18, 0.55)
typography:
  font_families:
    display: Inter
    body: Inter
  scale:
    - role: heading-1
      size: 32
      weight: 700
      family: display
      line_height: 1.2
    - role: heading-2
      size: 24
      weight: 700
      family: display
      line_height: 1.25
    - role: heading-3
      size: 18
      weight: 600
      family: display
      line_height: 1.3
    - role: body
      size: 14
      weight: 400
      family: body
      line_height: 1.5
    - role: label
      size: 12
      weight: 500
      family: body
      line_height: 1.4
    - role: small
      size: 11
      weight: 400
      family: body
      line_height: 1.4
spacing:
  unit: 8
  scale:
    - 4
    - 8
    - 12
    - 16
    - 24
    - 32
    - 48
    - 64
borders:
  radius:
    small: 8
    medium: 12
    large: 16
    pill: 9999
touch_targets:
  minimum_height: 44
  minimum_width: 44
elevation:
  levels:
    - level: 0
      shadow: none
      description: Flat — used for inline elements, tag chips, and page backgrounds
    - level: 1
      shadow: 0 1px 3px rgba(13, 15, 18, 0.08), 0 1px 2px rgba(13, 15, 18, 0.06)
      description: Cards — bookmark cards at rest, subtle lift from the background
    - level: 2
      shadow: 0 4px 12px rgba(13, 15, 18, 0.10), 0 2px 4px rgba(13, 15, 18, 0.06)
      description: Dropdowns — tag filter suggestions, search autocomplete panels
    - level: 3
      shadow: 0 12px 32px rgba(13, 15, 18, 0.14), 0 4px 8px rgba(13, 15, 18, 0.08)
      description: Modals and toasts — prominent overlaying elements, strong depth
        without drama
layout:
  grid:
    columns: 12
    gutter: 24
    margin: 24
  content_max_width: 1280
  breakpoints:
    mobile: 640
    tablet: 768
    desktop: 1024
    wide: 1440
z_index:
  dropdown: 1000
  sticky: 1100
  modal: 1200
  toast: 1300
  tooltip: 1400
opacity:
  scale:
    subtle: 0.1
    muted: 0.3
    disabled: 0.38
    overlay: 0.5
motion:
  durations:
    fast: 100
    normal: 200
    slow: 400
    page: 600
  easings:
    default: ease-out
    emphasized: cubic-bezier(0.2,0,0,1)
state:
  hover_opacity: 0.08
  disabled_opacity: 0.38
  focus_ring:
    color: cta-primary
    width: 2
    offset: 2
