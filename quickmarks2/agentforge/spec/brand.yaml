version: "1.0"
created_by: agentforge-init-llm
identity:
  tone: Warm and grounded. Speaks like a well-organized friend who enjoys
    stationery. Gentle affirmations on success, patient explanations on errors.
    Never rushed.
  audience: students and playful individuals who like to explore
illustration_style:
  direction: Organic line-art with watercolor fills
  description: Thin, slightly imperfect hand-drawn outlines of botanicals, paper
    stacks, and ribbon bookmarks. Fills use soft watercolor-style washes of
    sage, terracotta, and marigold with visible texture. A few friendly doodles
    (stars, dots, small leaves) scattered as accents.
motion_principles:
  page_transitions: fade
  interaction_feel: subtle
  easing: ease-out
  duration_base_ms: 200
accessibility:
  wcag_level: AA
