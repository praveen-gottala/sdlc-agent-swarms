version: "1.0"
created_by: agentforge-init-llm
colors:
  primitive:
    white: "#FFFFFF"
    slate: "#334155"
    blue-accent: "#2563EB"
    light-gray: "#F1F5F9"
    dark-gray: "#1E293B"
  semantic:
    background-primary: white
    text-primary: dark-gray
    cta-primary: blue-accent
    error: "#DC2626"
    success: "#16A34A"
    warning: "#CA8A04"
    info: blue-accent
    surface-secondary: light-gray
    text-secondary: slate
    border-default: light-gray
typography:
  font_families:
    display: DM Sans
    body: Inter
  scale:
    - role: heading-1
      size: 32
      weight: 700
      family: display
      line_height: 1.2
    - role: heading-2
      size: 24
      weight: 700
      family: display
      line_height: 1.25
    - role: heading-3
      size: 18
      weight: 600
      family: display
      line_height: 1.3
    - role: body
      size: 14
      weight: 400
      family: body
      line_height: 1.5
    - role: label
      size: 12
      weight: 500
      family: body
      line_height: 1.4
    - role: small
      size: 11
      weight: 400
      family: body
      line_height: 1.4
spacing:
  unit: 8
  scale:
    - 4
    - 8
    - 12
    - 16
    - 24
    - 32
    - 48
    - 64
borders:
  radius:
    small: 8
    medium: 12
    large: 16
    pill: 9999
touch_targets:
  minimum_height: 44
  minimum_width: 44
components:
  button:
    primary:
      bg: cta-primary
      text: background-primary
      radius: medium
      padding_x: 24
      padding_y: 12
      min_height: 44
    secondary:
      bg: transparent
      text: cta-primary
      border_color: slate
      border_width: 1
      radius: medium
    ghost:
      bg: transparent
      text: cta-primary
      radius: medium
  card:
    default:
      bg: background-primary
      border_color: light-gray
      border_width: 1
      border_style: solid
      radius: large
      padding: 24
    highlighted:
      bg: light-gray
      border_color: cta-primary
      border_width: 2
      border_style: solid
      radius: large
      padding: 24
  input:
    default:
      bg: background-primary
      text: text-primary
      border_color: light-gray
      radius: medium
      padding_x: 16
      padding_y: 12
      min_height: 44
    focus:
      border_color: cta-primary
      border_width: 2
    error:
      border_color: error
      border_width: 2
  tab_bar:
    active:
      bg: cta-primary
      text: background-primary
      radius: pill
    inactive:
      bg: transparent
      text: text-primary
  badge:
    success:
      bg: light-gray
      text: text-primary
      radius: pill
    warning:
      bg: light-gray
      text: dark-gray
      radius: pill
    error:
      bg: error
      text: background-primary
      radius: pill
    info:
      bg: cta-primary
      text: background-primary
      radius: pill
  avatar:
    default:
      size: 40
      border_radius: pill
      border_color: light-gray
      border_width: 2
  progress_bar:
    track:
      bg: light-gray
      radius: pill
      height: 8
    fill:
      bg: cta-primary
      radius: pill
