version: "1.0"
created_by: agentforge-init-llm
colors:
  primitive:
    void-black: "#0D0D14"
    deep-navy: "#12121F"
    panel-navy: "#1A1A2E"
    arcade-purple: "#7C3AED"
    hot-magenta: "#E040FB"
    electric-yellow: "#FFE600"
    neon-cyan: "#00F5FF"
    ghost-white: "#F0EEFF"
  semantic:
    background-primary: "#0D0D14"
    surface-primary: "#1A1A2E"
    surface-elevated: "#20203A"
    surface-secondary: "#12121F"
    surface-input: "#20203A"
    text-primary: "#F0EEFF"
    text-secondary: "#A89FC8"
    text-disabled: "#4A4468"
    text-on-cta: "#0D0D14"
    cta-primary: "#FFE600"
    cta-hover: "#00F5FF"
    border-default: "#2E2B4A"
    border-focus: "#00F5FF"
    border-error: "#E040FB"
    error: "#E040FB"
    success: "#00F5FF"
    warning: "#FFE600"
    info: "#7C3AED"
    overlay: rgba(13, 13, 20, 0.88)
typography:
  font_families:
    display: Press Start 2P
    body: Inter
  scale:
    - role: heading-1
      size: 32
      weight: 700
      family: display
      line_height: 1.2
    - role: heading-2
      size: 24
      weight: 700
      family: display
      line_height: 1.25
    - role: heading-3
      size: 18
      weight: 600
      family: display
      line_height: 1.3
    - role: body
      size: 14
      weight: 400
      family: body
      line_height: 1.5
    - role: label
      size: 12
      weight: 500
      family: body
      line_height: 1.4
    - role: small
      size: 11
      weight: 400
      family: body
      line_height: 1.4
spacing:
  unit: 8
  scale:
    - 4
    - 8
    - 12
    - 16
    - 24
    - 32
    - 48
    - 64
borders:
  radius:
    small: 8
    medium: 12
    large: 16
    pill: 9999
touch_targets:
  minimum_height: 44
  minimum_width: 44
elevation:
  levels:
    - level: 0
      shadow: none
      description: Flat — used for inline content, disabled states, and
        background-flush elements like the game grid cells at rest
    - level: 1
      shadow: "0 0 0 1px #2E2B4A, 0 2px 8px rgba(0,245,255,0.08)"
      description: Cards — used for mode selection tiles, stats rows, and player
        panels; a subtle cyan glow hints at interactivity
    - level: 2
      shadow: "0 0 0 1px #3A3660, 0 8px 24px rgba(124,58,237,0.25), 0 2px 8px
        rgba(0,0,0,0.6)"
      description: Dropdowns — used for difficulty tooltips, settings menus, and
        context panels; purple bloom gives depth against the dark field
    - level: 3
      shadow: "0 0 0 1px #4A4468, 0 16px 48px rgba(0,245,255,0.15), 0 0 80px
        rgba(124,58,237,0.2), 0 8px 16px rgba(0,0,0,0.8)"
      description: Modals — used for result overlays, quit confirmation, and stats
        panel; multi-layer glow creates a cinematic light-box feel
layout:
  grid:
    columns: 12
    gutter: 24
    margin: 24
  content_max_width: 1280
  breakpoints:
    mobile: 640
    tablet: 768
    desktop: 1024
    wide: 1440
z_index:
  dropdown: 1000
  sticky: 1100
  modal: 1200
  toast: 1300
  tooltip: 1400
opacity:
  scale:
    subtle: 0.1
    muted: 0.3
    disabled: 0.38
    overlay: 0.5
motion:
  durations:
    fast: 100
    normal: 200
    slow: 400
    page: 600
  easings:
    default: ease-out
    emphasized: cubic-bezier(0.2,0,0,1)
state:
  hover_opacity: 0.08
  disabled_opacity: 0.38
  focus_ring:
    color: cta-primary
    width: 2
    offset: 2
