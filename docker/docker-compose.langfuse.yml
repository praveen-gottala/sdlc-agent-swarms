# Langfuse v3 — Self-Hosted LLM Observability
#
# Usage:
#   docker compose -f docker/docker-compose.langfuse.yml up -d
#   Open http://localhost:3001 → create account → create API keys
#   export LANGFUSE_SECRET_KEY=sk-lf-...
#   export LANGFUSE_PUBLIC_KEY=pk-lf-...
#   export LANGFUSE_BASE_URL=http://localhost:3001
#
# Based on: https://github.com/langfuse/langfuse/blob/main/docker-compose.yml
# See docs/guides/langfuse-setup.md for full setup instructions.

services:
  langfuse-web:
    image: langfuse/langfuse:3
    depends_on:
      postgres:
        condition: service_started
      clickhouse:
        condition: service_started
      redis:
        condition: service_started
      minio:
        condition: service_started
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@postgres:5432/langfuse
      NEXTAUTH_URL: http://localhost:3001
      NEXTAUTH_SECRET: agentforge-langfuse-dev-secret
      SALT: agentforge-langfuse-dev-salt
      ENCRYPTION_KEY: 278b65ddfa35ecd3ea6a50d11699af2218cb95f4a451f76deb68a6a47294a998

      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_MIGRATION_URL: clickhouse://default:clickhouse@clickhouse:9000
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_CLUSTER_ENABLED: "false"

      REDIS_CONNECTION_STRING: redis://redis:6379

      LANGFUSE_S3_EVENT_UPLOAD_ENABLED: "true"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minioadmin
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: minioadmin
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"

      LANGFUSE_S3_MEDIA_UPLOAD_ENABLED: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse-media
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: minioadmin
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: minioadmin
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"

      LANGFUSE_S3_BATCH_EXPORT_ENABLED: "false"

      TELEMETRY_ENABLED: "false"
    restart: unless-stopped

  langfuse-worker:
    image: langfuse/langfuse-worker:3
    depends_on:
      postgres:
        condition: service_started
      clickhouse:
        condition: service_started
      redis:
        condition: service_started
      minio:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@postgres:5432/langfuse
      SALT: agentforge-langfuse-dev-salt
      ENCRYPTION_KEY: 278b65ddfa35ecd3ea6a50d11699af2218cb95f4a451f76deb68a6a47294a998

      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_MIGRATION_URL: clickhouse://default:clickhouse@clickhouse:9000
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_CLUSTER_ENABLED: "false"

      REDIS_CONNECTION_STRING: redis://redis:6379

      LANGFUSE_S3_EVENT_UPLOAD_ENABLED: "true"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minioadmin
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: minioadmin
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"

      LANGFUSE_S3_MEDIA_UPLOAD_ENABLED: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse-media
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: minioadmin
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: minioadmin
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"

      LANGFUSE_S3_BATCH_EXPORT_ENABLED: "false"

      TELEMETRY_ENABLED: "false"
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - langfuse-pg-data:/var/lib/postgresql/data
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:24
    environment:
      CLICKHOUSE_PASSWORD: clickhouse
    volumes:
      - langfuse-ch-data:/var/lib/clickhouse
    restart: unless-stopped

  redis:
    image: redis:7
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9090"
    entrypoint: >
      sh -c "
        minio server /data --console-address ':9090' &
        sleep 3;
        mc alias set local http://localhost:9000 minioadmin minioadmin;
        mc mb --ignore-existing local/langfuse;
        mc mb --ignore-existing local/langfuse-media;
        wait
      "
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - langfuse-minio-data:/data
    ports:
      - "9090:9090"
    restart: unless-stopped

volumes:
  langfuse-pg-data:
  langfuse-ch-data:
  langfuse-minio-data:
