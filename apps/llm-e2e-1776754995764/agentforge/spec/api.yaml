version: "1.0"
endpoints:
  - method: GET
    path: /api/tasks
    description: List tasks with optional filters (status, priority, assigneeId,
      search query), sorting (field, direction), and pagination (page,
      pageSize). Returns paginated task array with total count.
  - method: POST
    path: /api/tasks
    description: Create a new task. Accepts title, description, status, priority,
      assigneeId, dueDate, tags. Returns the created task object.
  - method: GET
    path: /api/tasks/stats
    description: "Returns aggregate task statistics for the dashboard: activeTasks
      count, completedToday count, overdueTasks count, teamOnline count."
  - method: GET
    path: /api/tasks/:id
    description: Fetch full detail of a single task by ID including assignee and
      createdBy relations.
  - method: PATCH
    path: /api/tasks/:id
    description: "Partially update a task. Accepts any subset of editable fields:
      title, description, status, priority, assigneeId, dueDate, tags. Returns
      the updated task."
  - method: DELETE
    path: /api/tasks/:id
    description: Delete a task by ID. Returns 204 No Content on success.
  - method: GET
    path: /api/tasks/:id/comments
    description: Fetch all comments for a task, sorted by createdAt ascending, with
      author user details.
  - method: POST
    path: /api/tasks/:id/comments
    description: Post a new comment on a task. Accepts body text. Returns the
      created comment with author details.
  - method: GET
    path: /api/tasks/:id/activity
    description: Fetch the activity log for a task, sorted by createdAt descending,
      with actor user details.
  - method: PATCH
    path: /api/tasks/bulk
    description: Bulk update tasks. Accepts an array of task IDs and a partial
      update payload (e.g., status, assigneeId). Returns updated tasks array.
  - method: DELETE
    path: /api/tasks/bulk
    description: Bulk delete tasks. Accepts an array of task IDs. Returns 204 No
      Content on success.
  - method: GET
    path: /api/users
    description: List all team members. Returns array of user objects with id, name,
      email, avatarUrl, role, isOnline.
  - method: GET
    path: /api/users/workload
    description: Returns per-user task assignment count and capacity for the team
      workload chart on the dashboard.
  - method: GET
    path: /api/users/:id
    description: Fetch a single user profile by ID.
  - method: GET
    path: /api/notifications
    description: Fetch all notifications for the authenticated user, sorted by
      createdAt descending. Supports optional filter isRead=true|false.
  - method: PATCH
    path: /api/notifications/:id/read
    description: Mark a single notification as read. Returns the updated notification.
  - method: PATCH
    path: /api/notifications/read-all
    description: Mark all notifications for the authenticated user as read. Returns
      updated count.
