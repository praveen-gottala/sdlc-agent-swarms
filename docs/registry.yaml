# Documentation Path Registry
#
# Skills and rules should reference logical names, not physical paths.
# When files move, update this registry — skills follow automatically.
#
# Usage pattern (TypeScript):
#   import { load } from 'js-yaml';
#   import { readFileSync } from 'node:fs';
#   const registry = load(readFileSync('docs/registry.yaml', 'utf8'));
#   const visionPath = registry.canonical.vision;
#
# Usage pattern (skill/rule file):
#   Instead of hardcoding `docs/vision.md`, reference `canonical.vision`
#   from this registry. When a file moves, one registry update propagates
#   to all consumers.
#
# Migration status:
#   Phase 4 creates this registry. Skills currently use hardcoded paths.
#   Future work migrates skills to read from the registry. No existing
#   behavior changes until migration occurs.

