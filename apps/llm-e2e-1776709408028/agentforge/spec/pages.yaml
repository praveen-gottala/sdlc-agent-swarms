pages:
  - id: dashboard
    name: Dashboard
    route: /
    description: Main dashboard showing active tasks summary, team workload
      overview, and key metrics. Includes a top navigation bar with a bell icon
      to open the notifications drawer.
    status: draft
    designStatus: rendered
    components:
      - id: top-nav
        type: NavigationBar
        description: Top navigation bar with TaskPilot logo, main nav links (Dashboard,
          Tasks), user avatar, and bell icon button to trigger notifications
          drawer
      - id: dashboard-heading
        type: PageHeader
        description: Page title 'Dashboard' with subtitle showing today's date and a
          greeting
      - id: stats-row
        type: StatsCardRow
        description: "Row of 4 summary stat cards: Total Active Tasks, Completed Today,
          Overdue Tasks, Team Members"
      - id: active-tasks-widget
        type: TaskListWidget
        description: Widget showing the top 5 most recent active tasks with title,
          assignee avatar, due date, and priority badge. Includes a 'View All'
          link.
      - id: team-workload-widget
        type: TeamWorkloadWidget
        description: Bar or progress-based visualization of each team member's task
          count and completion rate
      - id: overdue-tasks-widget
        type: OverdueTasksWidget
        description: List of overdue tasks grouped by assignee, each with a quick-action
          link to view task detail
    dataSources:
      - id: ds-dashboard-stats
        endpoint: GET /api/tasks/stats
        description: Aggregated task statistics for the stat cards
      - id: ds-active-tasks
        endpoint: GET /api/tasks?status=active&limit=5
        description: Top 5 active tasks for the task list widget
      - id: ds-team-workload
        endpoint: GET /api/users/workload
        description: Team workload data per user
      - id: ds-overdue-tasks
        endpoint: GET /api/tasks?status=overdue
        description: All overdue tasks
    screen_type: page
    navigates_to:
      - target: task-list
        trigger: Click 'View All' in active tasks widget
        mode: overlay
      - target: task-list
        trigger: Click 'Tasks' in navigation bar
      - target: task-detail
        trigger: Click a task row in active tasks widget
      - target: task-detail
        trigger: Click a task in overdue tasks widget
      - target: notifications-drawer
        trigger: Click bell icon in navigation bar
    correctionIteration: 0
    designScore: null
  - id: task-list
    name: Task List
    route: /tasks
    description: Full list of all tasks with filtering, sorting, and search.
      Supports filters by status, priority, assignee, and due date. Each task
      row shows key info and links to the task detail page.
    status: draft
    designStatus: generating
    components:
      - id: top-nav
        type: NavigationBar
        description: Top navigation bar with TaskPilot logo, main nav links (Dashboard,
          Tasks), user avatar, and bell icon button to trigger notifications
          drawer
      - id: task-list-header
        type: PageHeader
        description: Page title 'Tasks' with a 'New Task' primary CTA button that
          navigates to the task create form
      - id: filter-bar
        type: FilterBar
        description: "Row of filter controls: search input, status dropdown (All,
          Active, Completed, Overdue), priority filter (All, Low, Medium, High),
          assignee multi-select, and due date range picker"
      - id: task-table
        type: DataTable
        description: "Paginated table of tasks with columns: checkbox, title, assignee
          avatar+name, priority badge, status badge, due date, and actions menu
          (View, Delete). Rows are clickable to open task detail."
      - id: pagination-controls
        type: Pagination
        description: Page navigation controls with page size selector and current page
          indicator
    dataSources:
      - id: ds-tasks
        endpoint: GET /api/tasks
        description: Paginated and filtered list of tasks
      - id: ds-users-list
        endpoint: GET /api/users
        description: List of users for the assignee filter
    screen_type: page
    navigates_to:
      - target: dashboard
        trigger: Click 'Dashboard' in navigation bar
      - target: task-detail
        trigger: Click a task row in the table
      - target: task-detail
        trigger: Click 'View' in task actions menu
      - target: task-create
        trigger: Click 'New Task' button
      - target: delete-confirmation-modal
        trigger: Click 'Delete' in task actions menu
      - target: notifications-drawer
        trigger: Click bell icon in navigation bar
    correctionIteration: 0
  - id: task-detail
    name: Task Detail
    route: /tasks/:taskId
    description: Full detail view for a single task. Displays all task fields,
      activity log, comments, and allows editing inline. Includes a delete
      button that triggers the confirmation modal.
    status: draft
    designStatus: draft
    components:
      - id: top-nav
        type: NavigationBar
        description: Top navigation bar with TaskPilot logo, main nav links (Dashboard,
          Tasks), user avatar, and bell icon button to trigger notifications
          drawer
      - id: breadcrumb
        type: Breadcrumb
        description: "Breadcrumb trail: Home > Tasks > [Task Title]"
      - id: task-detail-header
        type: TaskDetailHeader
        description: "Task title (editable inline), status badge, priority badge, and
          action buttons: Edit, Delete"
      - id: task-meta-panel
        type: MetaPanel
        description: "Sidebar or top panel with task metadata: assignee, reporter, due
          date, created date, labels/tags"
      - id: task-description
        type: RichTextDisplay
        description: Full task description displayed with rich text formatting
      - id: task-checklist
        type: Checklist
        description: Optional subtask checklist with completion toggles
      - id: activity-log
        type: ActivityFeed
        description: Chronological log of all changes and comments on the task
      - id: comment-input
        type: CommentInput
        description: Text area and submit button for adding new comments to the task
    dataSources:
      - id: ds-task-detail
        endpoint: GET /api/tasks/:taskId
        description: Full task detail data
      - id: ds-task-comments
        endpoint: GET /api/tasks/:taskId/comments
        description: Comments and activity log for the task
    screen_type: page
    navigates_to:
      - target: task-list
        trigger: Click 'Tasks' breadcrumb or navigation bar link
      - target: dashboard
        trigger: Click 'Dashboard' in navigation bar
      - target: delete-confirmation-modal
        trigger: Click 'Delete' button
      - target: notifications-drawer
        trigger: Click bell icon in navigation bar
  - id: task-create
    name: Create Task
    route: /tasks/new
    description: "Form page for creating a new task. Includes all task fields:
      title, description, assignee, priority, due date, labels, and subtasks."
    status: draft
    designStatus: draft
    components:
      - id: top-nav
        type: NavigationBar
        description: Top navigation bar with TaskPilot logo, main nav links (Dashboard,
          Tasks), user avatar, and bell icon button
      - id: breadcrumb
        type: Breadcrumb
        description: "Breadcrumb trail: Home > Tasks > New Task"
      - id: create-task-form
        type: Form
        description: "Task creation form with fields: Title (text, required),
          Description (rich text), Assignee (user select), Priority
          (Low/Medium/High select), Due Date (date picker), Labels (tag input),
          Subtasks (dynamic list input). Cancel and 'Create Task' submit
          buttons."
    dataSources:
      - id: ds-users-list
        endpoint: GET /api/users
        description: List of users for assignee selection
    screen_type: page
    navigates_to:
      - target: task-list
        trigger: Click 'Cancel' button
      - target: task-detail
        trigger: Successful task creation, redirect to new task
      - target: notifications-drawer
        trigger: Click bell icon in navigation bar
  - id: notifications-drawer
    name: Notifications Drawer
    route: /notifications-drawer
    description: "A slide-in drawer from the right side of the screen showing the
      user's notifications: task assignments, mentions, status changes, and due
      date reminders. Opened by clicking the bell icon in the navigation bar."
    status: draft
    designStatus: draft
    components:
      - id: drawer-header
        type: DrawerHeader
        description: Header with title 'Notifications', a 'Mark All as Read' link, and a
          close (X) button
      - id: notification-tabs
        type: TabBar
        description: "Tabs to filter notifications: All, Unread, Mentions"
      - id: notification-list
        type: NotificationList
        description: Scrollable list of notification items, each showing an icon
          indicating type, message text, task title, and relative timestamp.
          Unread items have a highlighted background. Clicking a notification
          navigates to the relevant task.
      - id: empty-state
        type: EmptyState
        description: Empty state illustration and message shown when there are no
          notifications
    dataSources:
      - id: ds-notifications
        endpoint: GET /api/notifications
        description: List of notifications for the current user
    screen_type: drawer
    navigates_to:
      - target: task-detail
        trigger: Click a notification item
  - id: delete-confirmation-modal
    name: Delete Confirmation
    route: /delete-confirmation
    description: A centered modal overlay asking the user to confirm deletion of a
      task. Includes the task title for context, a warning message, and Cancel /
      Delete buttons.
    status: draft
    designStatus: draft
    components:
      - id: modal-icon
        type: Icon
        description: Warning icon in coral-accent color at the top of the modal
      - id: modal-title
        type: Heading
        description: "Modal title: 'Delete Task'"
      - id: modal-body
        type: Text
        description: "Confirmation message: 'Are you sure you want to delete \"[Task
          Title]\"? This action cannot be undone.'"
      - id: modal-actions
        type: ButtonGroup
        description: "Two buttons: 'Cancel' (secondary, closes modal) and 'Delete'
          (destructive primary in coral-accent, confirms deletion)"
    dataSources: []
    screen_type: modal
    navigates_to:
      - target: task-list
        trigger: Click 'Delete' confirm button (after successful deletion)
  - id: page-a-user-settings-page-for-profile-and-pre-mo7mmko5
    name: A user settings page for profile and preferences — B0a dedup E2E probe
      177671565
    description: A user settings page for profile and preferences — B0a dedup E2E
      probe 1776715654119
    route: /a-user-settings-page-for-profile-and-pre
    status: draft
    designStatus: draft
  - id: page-b0a-dedup-probe-1776716568809-user-setti-mo7n66f4
    name: B0a-dedup-probe-1776716568809 user settings for profile and preferences
    description: B0a-dedup-probe-1776716568809 user settings for profile and preferences
    route: /b0a-dedup-probe-1776716568809-user-setti
    status: draft
    designStatus: draft
